<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>账单分享</title>
<style>
	:root { --bg:#f4f7fb; --panel:#fff; --line:#d9e1ec; --line-soft:#edf2f8; --text:#1f2937; --muted:#6b7280; --blue:#2563eb; --red:#d93025; --green:#13a66b; }
	* { box-sizing:border-box; }
	html,body { width:100%; min-height:100%; margin:0; font-family:Arial,"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
	.share-page { min-height:100%; padding:0 14px 14px; }
	.share-panel { padding-top:var(--share-fixed-offset,112px); background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 10px 28px rgba(31,41,55,.06); overflow:hidden; }
	.share-sticky { position:fixed; top:0; left:0; right:0; z-index:100; padding:12px 18px 14px; background:rgba(255,255,255,.98); border-bottom:1px solid var(--line); box-shadow:0 8px 22px rgba(31,41,55,.10); }
	.summary-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
	.title-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
	.page-title { margin:0; font-size:20px; line-height:28px; font-weight:700; }
	.bill-count { display:inline-flex; align-items:center; gap:6px; min-height:30px; padding:0 10px; border-radius:6px; background:#eef4ff; color:var(--blue); font-size:13px; font-weight:700; }
	.share-grid { display:grid; grid-template-columns:repeat(4,minmax(140px,1fr)); gap:10px; margin-top:12px; }
	.share-item { padding:11px 12px; border:1px solid var(--line-soft); border-radius:8px; background:#f8fbff; box-shadow:inset 0 1px 0 rgba(255,255,255,.85); }
	.share-item.remote-jump { width:100%; text-align:left; color:inherit; cursor:pointer; }
	.share-item.remote-jump:hover { border-color:#f5c36b; background:#fffaf0; box-shadow:inset 0 0 0 1px rgba(183,121,31,.20); }
	.share-label { color:var(--muted); font-size:12px; }
	.share-value { margin-top:6px; font-size:19px; font-weight:700; }
	.table-scroll { width:100%; overflow:auto; }
	.bill-table { width:100%; min-width:980px; border-collapse:collapse; }
	.bill-table th,.bill-table td { border-bottom:1px solid var(--line-soft); padding:12px 14px; text-align:left; vertical-align:top; font-size:13px; }
	.bill-table th { background:#f8fafc; color:#475569; font-weight:700; white-space:nowrap; }
	.bill-table tbody tr:hover { background:#f8fbff; }
	.bill-table tr.remote-target { background:#fffdf8; }
	.bill-table tr.remote-focus { background:#fff8e8; box-shadow:inset 4px 0 0 #b7791f; }
	.money { color:var(--red); font-weight:700; white-space:nowrap; }
	.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; height:32px; padding:0 14px; border:1px solid #bcd3ff; border-radius:6px; background:#eef4ff; color:var(--blue); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
	.btn:hover { border-color:var(--blue); background:#e6efff; }
	.meta-stack { display:grid; gap:7px; }
	.meta-value { color:var(--muted); word-break:break-all; }
	.tag { display:inline-flex; align-items:center; min-height:22px; padding:0 8px; border-radius:999px; background:#e8f8f1; color:var(--green); font-size:12px; font-weight:700; }
	.tag.warn { background:#fff5f4; color:var(--red); }
	.empty-row td,.loading-row td { padding:28px 12px; text-align:center; color:var(--muted); }
	@media(max-width:760px){.summary-row{align-items:flex-start;flex-direction:column}.share-grid{grid-template-columns:1fr 1fr}.share-page{padding:0 10px 10px}.share-sticky{top:0;left:0;right:0;padding:10px}}
</style>
</head>
<body>
	<div class="share-page">
		<section class="share-panel">
			<div class="share-sticky">
			<div class="summary-row">
				<h1 class="page-title">账单分享</h1>
				<div class="title-actions">
					<button class="btn" type="button" id="exportShareBill">导出订单</button>
					<div class="bill-count">识别号：<span id="shareCodeText">-</span></div>
				</div>
			</div>
			<div class="share-grid">
				<div class="share-item"><div class="share-label">订单总数</div><div class="share-value" id="shareOrderCount">0</div></div>
				<button class="share-item remote-jump" type="button"><div class="share-label">偏远地区</div><div class="share-value" id="shareRemoteCount">0</div></button>
				<div class="share-item"><div class="share-label">错误订单</div><div class="share-value" id="shareErrorCount">0</div></div>
				<div class="share-item"><div class="share-label">合计金额</div><div class="share-value money" id="shareTotalAmount">0.00</div></div>
			</div>
			</div>
			<div class="table-scroll">
				<table class="bill-table">
					<thead><tr><th>订单编号</th><th>订单状态</th><th>收件信息</th><th>快递信息</th><th>发货内容</th><th>商品数量</th><th>代发价</th><th>小记</th><th>发货时间</th><th>打印时间</th></tr></thead>
					<tbody id="shareOrderRows"><tr class="loading-row"><td colspan="10">正在获取账单...</td></tr></tbody>
				</table>
			</div>
		</section>
	</div>
<script src="../js/jquery.min.js"></script>
<script src="../js/xlsx.full.min.js"></script>
<script>
	$(function () {
		var API_BASE = '../api';
		var currentBill = null;
		var remoteJumpIndex = -1;
		function updateFixedOffset() {
			var fixedBar = document.querySelector('.share-sticky');
			var fixedTop;
			if (!fixedBar) { return; }
			fixedTop = parseFloat(window.getComputedStyle(fixedBar).top) || 0;
			document.documentElement.style.setProperty('--share-fixed-offset', (fixedBar.offsetHeight + fixedTop) + 'px');
		}
		var exportHeaders = ['订单编号','订单状态','收件人','收件电话','省份','详细地址','快递公司','快递单号','发货内容','商品数量','代发价','小记','发货时间','打印时间'];
		function escapeHtml(value) { return String(value == null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
		function money(value) { return (Number(value) || 0).toFixed(2); }
		function queryValue(name) { return new URLSearchParams(window.location.search).get(name) || ''; }
		function orderItems(order) {
			return Array.isArray(order.items) && order.items.length ? order.items : [{
				sku: order.sku || '',
				quantity: order.totalQty || '',
				agentPrice: order.agentPrice || '',
				subtotal: order.amount || '',
				waybillCom: order.waybillCom || '',
				waybillNumber: order.waybillNumber || ''
			}];
		}
		function goodsContentText(items) {
			return items.map(function (item) {
				var sku = String(item.sku || '').trim();
				var qty = item.quantity || item.total || 0;
				return sku ? sku + '[' + qty + '];' : '';
			}).filter(Boolean).join('');
		}
		function exportRowsForBill(bill) {
			var orders = Array.isArray(bill.orderData) ? bill.orderData : [];
			return orders.map(function (order) {
				var items = orderItems(order);
				return {
					'订单编号': order.orderId || '',
					'订单状态': order.statusText || order.tradeStatus || '',
					'收件人': order.receiverName || '',
					'收件电话': order.receiverMobile || '',
					'省份': order.receiverProvince || '',
					'详细地址': order.receiverAddress || '',
					'快递公司': items.map(function (item) { return item.waybillCom || ''; }).filter(Boolean).join('\n'),
					'快递单号': items.map(function (item) { return item.waybillNumber || ''; }).filter(Boolean).join('\n'),
					'发货内容': goodsContentText(items),
					'商品数量': order.totalQty || items.reduce(function (sum, item) { return sum + (Number(item.quantity) || 0); }, 0),
					'代发价': items.map(function (item) { return item.agentPrice === '' ? '' : money(item.agentPrice); }).filter(Boolean).join('\n'),
					'小记': money(order.amount || 0),
					'发货时间': order.deliveryTime || '',
					'打印时间': order.printTime || ''
				};
			});
		}
		function renderShareBill(bill) {
			var orders = Array.isArray(bill.orderData) ? bill.orderData : [];
			currentBill = bill;
			$('#shareCodeText').text(bill.shareCode || '-');
			$('#shareOrderCount').text(bill.orderCount || 0);
			$('#shareRemoteCount').text(bill.remoteCount || 0);
			$('#shareErrorCount').text(bill.errorCount || 0);
			$('#shareTotalAmount').text(money(bill.totalAmount));
			if (!orders.length) {
				$('#shareOrderRows').html('<tr class="empty-row"><td colspan="10">暂无订单明细</td></tr>');
				return;
			}
			$('#shareOrderRows').html(orders.map(function (order) {
				var items = orderItems(order);
				return [
					'<tr class="' + (order.hasRemote ? 'remote-target' : '') + '">',
					'<td><div class="meta-stack"><span>' + escapeHtml(order.orderId || '-') + '</span><span class="meta-value">' + escapeHtml(order.platId || '') + '</span></div></td>',
					'<td><div class="meta-stack"><span>' + escapeHtml(order.statusText || order.tradeStatus || '-') + '</span>' + (order.hasRemote ? '<span class="tag">偏远</span>' : '<span class="tag">正常</span>') + (order.hasError ? '<span class="tag warn">错误</span>' : '') + '</div></td>',
					'<td><div class="meta-stack"><span>' + escapeHtml(order.receiverName || '-') + ' ' + escapeHtml(order.receiverMobile || '') + '</span><span class="meta-value">' + escapeHtml((order.receiverProvince || '') + ' ' + (order.receiverAddress || '')) + '</span></div></td>',
					'<td><div class="meta-stack"><span>' + escapeHtml(items.map(function (item) { return item.waybillCom || ''; }).filter(Boolean).join(' / ') || '-') + '</span><span class="meta-value">' + escapeHtml(items.map(function (item) { return item.waybillNumber || ''; }).filter(Boolean).join(' / ')) + '</span></div></td>',
					'<td>' + escapeHtml(goodsContentText(items) || '-') + '</td>',
					'<td>' + escapeHtml(order.totalQty || 0) + '</td>',
					'<td><div class="meta-stack">' + items.map(function (item) { return '<span>' + escapeHtml(item.agentPrice === '' ? '-' : money(item.agentPrice)) + '</span>'; }).join('') + '</div></td>',
					'<td><span class="money">' + money(order.amount) + '</span></td>',
					'<td>' + escapeHtml(order.deliveryTime || '-') + '</td>',
					'<td>' + escapeHtml(order.printTime || '-') + '</td>',
					'</tr>'
				].join('');
			}).join('') + '<tr><td colspan="7"></td><td class="money">合计总额：' + money(bill.totalAmount) + '</td><td colspan="2"></td></tr>');
			remoteJumpIndex = -1;
			updateFixedOffset();
		}
		function loadShareBill(code) {
			return fetch(API_BASE + '/getBillShare/index.php', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json;charset=UTF-8' },
				body: JSON.stringify({ shareCode: code }),
				redirect: 'follow'
			}).then(function (res) { return res.json(); }).then(function (data) {
				if (!data || !data.success || !data.data) { throw new Error(data && data.txt ? data.txt : '获取分享账单失败'); }
				renderShareBill(data.data);
			}).catch(function (error) {
				$('#shareOrderRows').html('<tr class="empty-row"><td colspan="6">' + escapeHtml(error.message || '获取分享账单失败') + '</td></tr>');
			});
		}
		$('#exportShareBill').on('click', function () {
			var rows;
			var sheet;
			var workbook;
			if (!currentBill) { return; }
			if (!window.XLSX) { return; }
			rows = exportRowsForBill(currentBill);
			rows.push({
				'订单编号': '',
				'订单状态': '',
				'收件人': '',
				'收件电话': '',
				'省份': '',
				'详细地址': '',
				'快递公司': '',
				'快递单号': '',
				'发货内容': '合计总额：' + money(currentBill.totalAmount),
				'商品数量': '',
				'代发价': '',
				'小记': money(currentBill.totalAmount),
				'发货时间': '',
				'打印时间': ''
			});
			sheet = XLSX.utils.json_to_sheet(rows, { header:exportHeaders });
			workbook = XLSX.utils.book_new();
			XLSX.utils.book_append_sheet(workbook, sheet, '账单订单');
			XLSX.writeFile(workbook, 'bill-' + (currentBill.shareCode || new Date().getTime()) + '.xlsx');
		});
		$('.remote-jump').on('click', function () {
			var $targets = $('#shareOrderRows tr.remote-target');
			var $target;
			if (!$targets.length) { return; }
			remoteJumpIndex = (remoteJumpIndex + 1) % $targets.length;
			$target = $targets.eq(remoteJumpIndex);
			$('#shareOrderRows tr.remote-focus').removeClass('remote-focus');
			$target.addClass('remote-focus');
			$target[0].scrollIntoView({ behavior:'smooth', block:'center' });
		});
		$(window).on('resize', updateFixedOffset);
		updateFixedOffset();
		loadShareBill(queryValue('code'));
	});
</script>
</body>
</html>

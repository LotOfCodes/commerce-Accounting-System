<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>产品列表</title>
<style>
	:root {
		--bg: #f3f6fb;
		--panel: #fff;
		--line: #dfe5ef;
		--line-soft: #edf1f7;
		--text: #1f2937;
		--muted: #6b7280;
		--blue: #3e7cff;
		--blue-dark: #2f6dec;
		--green: #13a66b;
		--red: #d93025;
	}
	* {
		box-sizing: border-box;
	}
	html,
	body {
		width: 100%;
		height: 100%;
		margin: 0;
		font-family: Arial, "Microsoft YaHei", sans-serif;
		background: var(--bg);
		color: var(--text);
	}
	button,
	input,
	select {
		font-family: inherit;
	}
	.products-page {
		min-height: 100%;
		padding: 14px 14px 76px;
	}
	.toolbar {
		background: var(--panel);
		border: 1px solid var(--line);
		border-radius: 8px;
		padding: 14px;
		box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
	}
	.summary-row {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 12px;
		margin-bottom: 12px;
	}
	.page-title {
		margin: 0;
		font-size: 20px;
		line-height: 28px;
	}
	.product-count {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		min-height: 28px;
		padding: 0 10px;
		border-radius: 6px;
		background: #eef4ff;
		color: var(--blue);
		font-size: 13px;
		font-weight: 700;
	}
	.filter-grid {
		display: grid;
		grid-template-columns: repeat(5, minmax(140px, 1fr));
		gap: 10px;
	}
	.field {
		display: flex;
		flex-direction: column;
		gap: 6px;
		min-width: 0;
	}
	.field label {
		font-size: 12px;
		color: var(--muted);
	}
	.field input,
	.field select {
		width: 100%;
		height: 34px;
		padding: 0 10px;
		border: 1px solid var(--line);
		border-radius: 6px;
		outline: 0;
		background: #fff;
		color: var(--text);
		font-size: 13px;
	}
	.field input:focus,
	.field select:focus {
		border-color: var(--blue);
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.12);
	}
	.filter-actions {
		display: flex;
		align-items: flex-end;
		gap: 8px;
	}
	.btn {
		height: 34px;
		padding: 0 14px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		cursor: pointer;
		white-space: nowrap;
	}
	.btn:hover {
		border-color: var(--blue);
		color: var(--blue);
	}
	.btn.primary {
		border-color: var(--blue);
		background: var(--blue);
		color: #fff;
	}
	.btn.primary:hover {
		background: var(--blue-dark);
		color: #fff;
	}
	.table-panel {
		margin-top: 14px;
		background: var(--panel);
		border: 1px solid var(--line);
		border-radius: 8px;
		overflow: hidden;
		box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
	}
	.table-scroll {
		width: 100%;
		overflow: auto;
	}
	.products-table {
		width: 100%;
		min-width: 1040px;
		border-collapse: collapse;
	}
	.products-table th,
	.products-table td {
		border-bottom: 1px solid var(--line-soft);
		padding: 12px;
		text-align: left;
		vertical-align: top;
		font-size: 13px;
	}
	.products-table th {
		position: sticky;
		top: 0;
		z-index: 1;
		background: #f8fafc;
		color: #4b5563;
		font-weight: 700;
	}
	.products-table tbody tr:hover {
		background: #fbfdff;
	}
	.check-cell {
		width: 44px;
		text-align: center;
	}
	.product-name {
		font-weight: 700;
		font-size: 14px;
	}
	.rule-code {
		display: inline-block;
		max-width: 280px;
		padding: 4px 7px;
		border: 1px solid #dbe7ff;
		border-radius: 5px;
		background: #f7faff;
		color: #1d4ed8;
		font-family: Consolas, "Courier New", monospace;
		font-size: 12px;
		line-height: 18px;
		word-break: break-all;
	}
	.meta-stack {
		display: grid;
		gap: 7px;
	}
	.meta-line {
		display: flex;
		align-items: flex-start;
		gap: 6px;
		line-height: 20px;
	}
	.meta-label {
		flex: 0 0 auto;
		color: var(--muted);
	}
	.meta-value {
		min-width: 0;
		word-break: break-all;
	}
	.price {
		font-weight: 700;
		color: var(--red);
	}
	.tag {
		display: inline-flex;
		align-items: center;
		min-height: 24px;
		padding: 0 8px;
		border-radius: 999px;
		background: #e8f8f1;
		color: var(--green);
		font-size: 12px;
		font-weight: 700;
	}
	.action-group {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
	}
	.link-btn {
		height: 28px;
		padding: 0 10px;
		border: 1px solid #cfe0ff;
		border-radius: 5px;
		background: #f3f7ff;
		color: var(--blue);
		font-size: 12px;
		cursor: pointer;
	}
	.link-btn.danger {
		border-color: #ffd9d6;
		background: #fff5f4;
		color: #d93025;
	}
	.pagination {
		display: flex;
		align-items: center;
		justify-content: flex-end;
		gap: 8px;
		padding: 12px;
		color: var(--muted);
		font-size: 13px;
	}
	.page-num {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 30px;
		height: 30px;
		border-radius: 6px;
		background: var(--blue);
		color: #fff;
		font-weight: 700;
	}
	.bottom-tools {
		position: fixed;
		left: 0;
		right: 0;
		bottom: 0;
		display: flex;
		justify-content: center;
		gap: 8px;
		padding: 12px 14px;
		background: rgba(31, 41, 55, 0.86);
		backdrop-filter: blur(8px);
	}
	.bottom-tools .btn {
		border-color: rgba(255, 255, 255, 0.2);
		background: rgba(255, 255, 255, 0.1);
		color: #fff;
	}
	.bottom-tools .btn:hover {
		border-color: #fff;
		color: #fff;
	}
	.toast {
		position: fixed;
		left: 50%;
		bottom: 76px;
		transform: translateX(-50%);
		display: none;
		padding: 9px 14px;
		border-radius: 6px;
		background: rgba(17, 24, 39, 0.92);
		color: #fff;
		font-size: 13px;
	}
	.toast.show {
		display: block;
	}
	@media (max-width: 1000px) {
		.filter-grid {
			grid-template-columns: repeat(3, minmax(140px, 1fr));
		}
	}
	@media (max-width: 720px) {
		.products-page {
			padding: 10px 10px 88px;
		}
		.summary-row {
			align-items: flex-start;
			flex-direction: column;
		}
		.filter-grid {
			grid-template-columns: 1fr;
		}
		.filter-actions,
		.bottom-tools {
			flex-wrap: wrap;
		}
		.filter-actions .btn {
			flex: 1 1 120px;
		}
	}
</style>
</head>
<body>
	<div class="products-page">
		<section class="toolbar">
			<div class="summary-row">
				<h1 class="page-title">产品列表</h1>
				<div class="product-count">产品总数：<span id="productCount">1</span></div>
			</div>
			<div class="filter-grid">
				<div class="field">
					<label for="keyword">产品名称</label>
					<input id="keyword" type="text" placeholder="输入产品名称">
				</div>
				<div class="field">
					<label for="shippingFilter">是否包邮</label>
					<select id="shippingFilter">
						<option value="">全部</option>
						<option value="yes">包邮</option>
						<option value="no">不包邮</option>
					</select>
				</div>
				<div class="field">
					<label for="statusFilter">状态</label>
					<select id="statusFilter">
						<option value="">全部状态</option>
						<option value="active">有效</option>
						<option value="expired">已过期</option>
					</select>
				</div>
				<div class="field">
					<label for="startDate">有效期开始</label>
					<input id="startDate" type="date" value="2025-03-03">
				</div>
				<div class="filter-actions">
					<button class="btn primary" type="button" id="searchButton">搜索</button>
					<button class="btn" type="button" id="resetButton">重置</button>
				</div>
			</div>
		</section>

		<section class="table-panel">
			<div class="table-scroll">
				<table class="products-table">
					<thead>
						<tr>
							<th class="check-cell"><input type="checkbox" aria-label="全选"></th>
							<th>产品名称</th>
							<th>匹配规则</th>
							<th>价格信息</th>
							<th>是否包邮</th>
							<th>有效期</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody id="productsList">
						<tr data-product-id="PROD202503030001">
							<td class="check-cell"><input type="checkbox" aria-label="选择产品 荔枝 2 年苗 1 棵装"></td>
							<td>
								<div class="product-name">荔枝 2 年苗 1 棵装</div>
							</td>
							<td>
								<span class="rule-code">荔枝苗.*(1|一)(棵|颗)</span>
							</td>
							<td>
								<div class="meta-stack">
									<div class="meta-line">
										<span class="meta-label">单价价格：</span>
										<span class="meta-value price">￥58.00</span>
									</div>
									<div class="meta-line">
										<span class="meta-label">多件价格：</span>
										<span class="meta-value price">2 件 ￥108.00 / 3 件 ￥156.00</span>
									</div>
								</div>
							</td>
							<td><span class="tag">包邮</span></td>
							<td>
								<div class="meta-stack">
									<div class="meta-line">
										<span class="meta-label">开始：</span>
										<span class="meta-value">2025 03-03 00:00</span>
									</div>
									<div class="meta-line">
										<span class="meta-label">结束：</span>
										<span class="meta-value">2025 03-04 00:00</span>
									</div>
								</div>
							</td>
							<td>
								<div class="action-group">
									<button class="link-btn" type="button">编辑</button>
									<button class="link-btn danger" type="button">删除</button>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			<div class="pagination">
				<span>共 1 条</span>
				<button class="btn" type="button">上一页</button>
				<span class="page-num">1</span>
				<button class="btn" type="button">下一页</button>
			</div>
		</section>
	</div>

	<div class="bottom-tools">
		<button class="btn" type="button">添加产品</button>
		<button class="btn" type="button">批量删除</button>
		<button class="btn" type="button">导入表格</button>
		<button class="btn" type="button">导出表格</button>
	</div>
	<div class="toast" id="toast">当前为演示数据</div>

<script>
	(function () {
		var toast = document.getElementById('toast');
		var keyword = document.getElementById('keyword');
		var shippingFilter = document.getElementById('shippingFilter');
		var statusFilter = document.getElementById('statusFilter');
		var startDate = document.getElementById('startDate');

		function showToast(text) {
			toast.textContent = text;
			toast.classList.add('show');
			window.clearTimeout(showToast.timer);
			showToast.timer = window.setTimeout(function () {
				toast.classList.remove('show');
			}, 1400);
		}

		document.getElementById('searchButton').addEventListener('click', function () {
			showToast('当前为演示数据');
		});

		document.getElementById('resetButton').addEventListener('click', function () {
			keyword.value = '';
			shippingFilter.value = '';
			statusFilter.value = '';
			startDate.value = '2025-03-03';
		});

		document.querySelectorAll('.link-btn, .bottom-tools .btn, .pagination .btn').forEach(function (button) {
			button.addEventListener('click', function () {
				showToast(button.textContent.trim() + '：演示操作');
			});
		});
	})();
</script>
</body>
</html>

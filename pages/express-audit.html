<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>快递账单核对</title>
<style>
:root{--bg:#f3f6fb;--panel:#fff;--line:#dfe5ef;--line-soft:#edf1f7;--text:#1f2937;--muted:#6b7280;--blue:#3e7cff;--blue-dark:#2f6dec;--green:#13a66b;--red:#d93025;--amber:#b7791f}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font-family:inherit}.audit-page{min-height:100%;padding:14px 14px 80px}.toolbar,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(31,41,55,.06)}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px}.page-title{margin:0;font-size:20px;line-height:28px}.title-sub{margin-top:4px;color:var(--muted);font-size:12px}.panel{margin-top:14px;overflow:hidden}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line-soft);background:#fbfdff}.panel-title{margin:0;font-size:15px}.detail-tabs{display:flex;align-items:center;gap:6px;margin-top:8px}.tab-btn{height:28px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--muted);font-size:12px;cursor:pointer}.tab-btn.active{border-color:var(--blue);background:#eef4ff;color:var(--blue);font-weight:700}.table-scroll{width:100%;overflow:auto}table{width:100%;border-collapse:collapse}.task-table{min-width:920px}.detail-table,.preview-table{min-width:1120px}th,td{border-bottom:1px solid var(--line-soft);padding:11px 12px;text-align:left;vertical-align:top;font-size:13px}th{position:sticky;top:0;z-index:1;background:#f8fafc;color:#4b5563;font-weight:700}tbody tr:hover{background:#fbfdff}.empty-row td,.loading-row td{padding:28px 12px;text-align:center;color:var(--muted)}.btn,.link-btn,.icon-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--text);cursor:pointer;white-space:nowrap}.btn{height:34px;padding:0 14px;font-size:13px}.link-btn{min-height:28px;padding:0 10px;border-color:#cfe0ff;border-radius:5px;background:#f3f7ff;color:var(--blue);font-size:12px}.icon-btn{width:34px;height:34px;padding:0}.btn:hover,.link-btn:hover,.icon-btn:hover,.tab-btn:hover{border-color:var(--blue);color:var(--blue)}.btn.primary{border-color:var(--blue);background:var(--blue);color:#fff}.btn.primary:hover{background:var(--blue-dark);color:#fff}.link-btn.danger,.btn.danger{border-color:#ffd9d6;background:#fff5f4;color:var(--red)}.action-group,.filter-actions,.modal-actions,.mark-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.icon{width:15px;height:15px;flex:0 0 auto;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}.icon-sprite{position:absolute;width:0;height:0;overflow:hidden}.progress{display:grid;gap:6px;min-width:180px}.progress-bar{height:8px;border-radius:999px;background:#eef2f7;overflow:hidden}.progress-inner{height:100%;border-radius:inherit;background:var(--blue)}.progress-text{color:var(--muted);font-size:12px}.tag{display:inline-flex;align-items:center;min-height:22px;padding:0 8px;border-radius:999px;background:#eef4ff;color:var(--blue);font-size:12px;font-weight:700}.tag.red{background:#fff1f0;color:var(--red)}.tag.yellow{background:#fff7e6;color:var(--amber)}.tag.green{background:#e8f8f1;color:var(--green)}.tag.muted{background:#f3f4f6;color:var(--muted)}.money{font-weight:800}.money.bad{color:var(--red)}.money.warn{color:var(--amber)}.modal-backdrop{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(15,23,42,.48)}.modal-backdrop.show{display:flex}.modal{width:min(760px,100%);max-height:calc(100vh - 36px);overflow:auto;border-radius:8px;background:#fff;box-shadow:0 18px 50px rgba(15,23,42,.26)}.modal.wide{width:min(1180px,100%)}.modal-head,.modal-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px;border-bottom:1px solid var(--line-soft)}.modal-actions{justify-content:flex-end;border-top:1px solid var(--line-soft);border-bottom:0}.modal-title{margin:0;font-size:18px}.modal-body{display:grid;gap:12px;padding:14px}.form-grid,.mapping-grid{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:12px}.field{display:flex;flex-direction:column;gap:6px;min-width:0}.field label{font-size:12px;color:var(--muted)}.field input,.field select{width:100%;height:34px;padding:0 10px;border:1px solid var(--line);border-radius:6px;outline:0;background:#fff;color:var(--text);font-size:13px}.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(62,124,255,.12)}.drop-zone{display:flex;align-items:center;justify-content:center;min-height:150px;padding:18px;border:1px dashed #a8b6ce;border-radius:8px;background:#f8fbff;color:var(--muted);text-align:center;cursor:pointer}.drop-zone.dragover{border-color:var(--blue);background:#eef4ff;color:var(--blue)}.summary-line{color:var(--muted);font-size:13px}.detail-panel{display:none}.detail-panel.show{display:block}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:50;display:none;padding:9px 14px;border-radius:6px;background:rgba(17,24,39,.92);color:#fff;font-size:13px}.toast.show{display:block}@media(max-width:760px){.audit-page{padding:10px 10px 80px}.toolbar,.panel-head{align-items:flex-start;flex-direction:column}.form-grid,.mapping-grid{grid-template-columns:1fr}.modal-actions{flex-wrap:wrap}.modal-actions .btn{flex:1 1 120px}}
</style>
</head>
<body>
<svg class="icon-sprite" aria-hidden="true"><symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></symbol><symbol id="i-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4"></path><path d="M21 3v6h-6"></path></symbol><symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M5 21h14"></path></symbol><symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></symbol><symbol id="i-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7Z"></path></symbol><symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></symbol><symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="M6 6l12 12"></path></symbol></svg>
<div class="audit-page">
	<section class="toolbar">
		<div><h1 class="page-title">快递账单核对</h1><div class="title-sub">导入快递账单，按订单运单与快递资费自动标记红黄绿。</div></div>
		<div class="filter-actions"><button class="btn" type="button" id="refreshTasks"><svg class="icon"><use href="#i-refresh"></use></svg>刷新</button><button class="btn primary" type="button" id="openNewTask"><svg class="icon"><use href="#i-plus"></use></svg>发起对账</button></div>
	</section>
	<section class="panel">
		<div class="panel-head"><h2 class="panel-title">对账任务列表</h2></div>
		<div class="table-scroll"><table class="task-table"><thead><tr><th>日期</th><th>快递公司</th><th>任务进度</th><th>金额偏差百分比</th><th>标记</th><th>操作</th></tr></thead><tbody id="taskRows"><tr class="loading-row"><td colspan="6">正在获取对账任务...</td></tr></tbody></table></div>
	</section>
	<section class="panel detail-panel" id="detailPanel">
		<div class="panel-head"><div><h2 class="panel-title" id="detailTitle">对账明细</h2><div class="detail-tabs" role="tablist" aria-label="对账明细筛选"><button class="tab-btn active" type="button" data-detail-tab="all">全部</button><button class="tab-btn" type="button" data-detail-tab="suspicious">存疑数据</button></div></div><span class="summary-line" id="detailSummary"></span></div>
		<div class="table-scroll"><table class="detail-table"><thead><tr><th>标记</th><th>运单号</th><th>日期</th><th>省份</th><th>账单重量</th><th>订单重量</th><th>账单费用</th><th>预计费用</th><th>偏差</th><th>订单</th><th>说明</th><th>手动标记</th></tr></thead><tbody id="detailRows"></tbody></table></div>
	</section>
</div>

<div class="modal-backdrop" id="fileModal"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="fileTitle"><div class="modal-head"><h2 class="modal-title" id="fileTitle">发起对账</h2><button class="icon-btn" type="button" data-close="fileModal" aria-label="关闭"><svg class="icon"><use href="#i-x"></use></svg></button></div><div class="modal-body"><div class="form-grid"><div class="field"><label for="expressCompany">快递公司</label><select id="expressCompany"></select></div><div class="field"><label for="extraFee">单号费用</label><input id="extraFee" type="number" step="0.01" value="0"></div></div><label class="drop-zone" id="dropZone" for="fileInput"><span><strong>选择文件或拖入文件</strong><br>支持 xlsx、xls、csv，读取后可调整字段映射。</span></label><input id="fileInput" type="file" accept=".xlsx,.xls,.csv" hidden></div></div></div>
<div class="modal-backdrop" id="mapModal"><div class="modal wide" role="dialog" aria-modal="true" aria-labelledby="mapTitle"><div class="modal-head"><h2 class="modal-title" id="mapTitle">字段映射与预览</h2><button class="icon-btn" type="button" data-close="mapModal" aria-label="关闭"><svg class="icon"><use href="#i-x"></use></svg></button></div><div class="modal-body"><div class="summary-line" id="importSummary"></div><div class="mapping-grid" id="mappingGrid"></div><div class="table-scroll"><table class="preview-table"><thead><tr id="previewHead"></tr></thead><tbody id="previewRows"></tbody></table></div></div><div class="modal-actions"><button class="btn" type="button" data-close="mapModal">取消</button><button class="btn primary" type="button" id="uploadAudit"><svg class="icon"><use href="#i-upload"></use></svg>上传并对账</button></div></div></div>
<div class="toast" id="toast">已更新</div>
<script src="../js/jquery.min.js"></script>
<script src="../js/xlsx.full.min.js"></script>
<script>
$(function(){
	var API_BASE='../api';
	var tasks=[],currentTask=null,currentItems=[],expresses=[],importRows=[],importHeaders=[],importMapping={},detailTab='all';
	var fields=[
		{key:'waybillNumber',label:'运单号',required:true,aliases:['运单号','快递单号','物流单号','单号','面单号','waybill','tracking']},
		{key:'billDate',label:'日期/时间',aliases:['日期','时间','结算日期','揽收时间','寄件时间','date','time']},
		{key:'weight',label:'重量',aliases:['重量','计费重量','实重','weight']},
		{key:'actualFee',label:'费用',required:true,aliases:['费用','金额','运费','应收金额','结算金额','实收','fee','amount']},
		{key:'province',label:'省份',aliases:['省份','省','目的省份','收件省','province']}
	];
	function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
	function toast(t){$('#toast').text(t).addClass('show');clearTimeout(toast.timer);toast.timer=setTimeout(function(){$('#toast').removeClass('show')},1600)}
	function token(){try{return (JSON.parse(localStorage.getItem('orders-token')||'{}').token||'').trim()}catch(e){return ''}}
	function req(endpoint,payload){return fetch(API_BASE+endpoint,{method:'POST',headers:{'Content-Type':'application/json;charset=UTF-8','token':token()},body:JSON.stringify(payload||{}),redirect:'follow'}).then(function(res){return res.json()})}
	function icon(id){return '<svg class="icon" aria-hidden="true"><use href="#'+id+'"></use></svg>'}
	function money(v){var n=Number(v);return isNaN(n)?'0.00':n.toFixed(2)}
	function pct(v){var n=Number(v);return isNaN(n)?'0.00%':n.toFixed(2)+'%'}
	function statusText(s){return s==='red'?'非我方发货':(s==='yellow'?'可疑':'正常')}
	function statusTag(s){return '<span class="tag '+esc(s||'muted')+'">'+statusText(s)+'</span>'}
	function progress(task){var total=Number(task.totalCount)||0,checked=Number(task.checkedCount)||0,p=total?Math.round(checked/total*100):0;return '<div class="progress"><div class="progress-bar"><div class="progress-inner" style="width:'+p+'%"></div></div><div class="progress-text">'+checked+' / '+total+'，'+p+'%</div></div>'}
	function normalizeHeader(v){return String(v==null?'':v).toLowerCase().replace(/\s+/g,'').replace(/[：:()（）\-_]/g,'')}
	function cell(v){if(v==null)return '';if(v instanceof Date)return formatDate(v);return String(v).trim()}
	function pad2(v){v=parseInt(v,10)||0;return(v<10?'0':'')+v}
	function formatDate(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes())+':'+pad2(d.getSeconds())}
	function normalizeDate(v){
		var text=cell(v).replace(/号/g,'日').replace(/\//g,'-').replace(/\s+/g,' ');
		var date;
		var match;
		if(!text)return '';
		if(/^\d+(\.\d+)?$/.test(text)&&window.XLSX&&XLSX.SSF){
			date=XLSX.SSF.parse_date_code(Number(text));
			if(date)return date.y+'-'+pad2(date.m)+'-'+pad2(date.d)+' '+pad2(date.H||0)+':'+pad2(date.M||0)+':'+pad2(Math.floor(date.S||0));
		}
		match=text.match(/^(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日?(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
		if(match)return match[1]+'-'+pad2(match[2])+'-'+pad2(match[3])+' '+pad2(match[4]||0)+':'+pad2(match[5]||0)+':'+pad2(match[6]||0);
		match=text.match(/^(\d{1,2})月\s*(\d{1,2})日?(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
		if(match)return new Date().getFullYear()+'-'+pad2(match[1])+'-'+pad2(match[2])+' '+pad2(match[3]||0)+':'+pad2(match[4]||0)+':'+pad2(match[5]||0);
		match=text.match(/^(\d{4})[.-](\d{1,2})[.-](\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
		return match?match[1]+'-'+pad2(match[2])+'-'+pad2(match[3])+' '+pad2(match[4]||0)+':'+pad2(match[5]||0)+':'+pad2(match[6]||0):text;
	}
	function value(row,key){var h=importMapping[key];return h?cell(row[h]):''}
	function num(v){v=String(v||'').replace(/[^0-9.\-]/g,'');return v===''?'0':v}
	function autoMap(headers){var normalized=headers.map(function(h){return{raw:h,value:normalizeHeader(h)}}),map={};fields.forEach(function(f){var aliases=[f.label].concat(f.aliases||[]).map(normalizeHeader),found=normalized.find(function(item){return aliases.some(function(a){return item.value===a||item.value.indexOf(a)>-1||a.indexOf(item.value)>-1})});if(found)map[f.key]=found.raw});return map}
	function looksTotal(row){var text=Object.keys(row).map(function(k){return cell(row[k])}).join(' ');return /合计|总计|小计|total/i.test(text)&&!value(row,'waybillNumber')}
	function mapped(row){return{waybillNumber:value(row,'waybillNumber'),billDate:normalizeDate(value(row,'billDate')),weight:num(value(row,'weight')),actualFee:num(value(row,'actualFee')),province:value(row,'province')}}
	function valid(row){var m=mapped(row);return m.waybillNumber&&m.actualFee!==''&&!looksTotal(row)}
	function loadExpresses(){return req('/getExpresses/index.php',{}).then(function(data){expresses=data&&data.success?data.data||[]:[];$('#expressCompany').html(expresses.map(function(e){return '<option value="'+esc(e.expressName||'')+'">'+esc(e.expressName||'')+'</option>'}).join('')||'<option value="">暂无快递</option>')}).catch(function(){toast('获取快递公司失败')})}
	function loadTasks(){return req('/getExpressAudits/index.php',{}).then(function(data){if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'获取任务失败');tasks=data.data||[];renderTasks()}).catch(function(e){tasks=[];renderTasks();toast(e.message||'获取任务失败')})}
	function renderTasks(){
		if(!tasks.length){
			$('#taskRows').html('<tr class="empty-row"><td colspan="6">暂无对账任务</td></tr>');
			return;
		}
		$('#taskRows').html(tasks.map(function(t){
			return '<tr data-id="'+esc(t.id)+'"><td>'+esc(t.taskDate||'-')+'</td><td>'+esc(t.expressCompany||'-')+'</td><td>'+progress(t)+'</td><td><span class="money '+(Number(t.deviationPercent)>20?'warn':'')+'">'+pct(t.deviationPercent)+'</span></td><td><span class="tag red">红 '+esc(t.redCount||0)+'</span> <span class="tag yellow">黄 '+esc(t.yellowCount||0)+'</span> <span class="tag green">绿 '+esc(t.greenCount||0)+'</span></td><td><div class="action-group"><button class="link-btn continue-task" type="button">'+icon('i-play')+'继续对账</button><button class="link-btn export-task" type="button">'+icon('i-download')+'导出存疑</button><button class="link-btn danger delete-task" type="button">'+icon('i-trash')+'删</button></div></td></tr>';
		}).join(''));
	}
	function loadDetail(id){return req('/getExpressAuditDetail/index.php',{id:id}).then(function(data){if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'获取明细失败');currentTask=data.task;currentItems=data.items||[];renderDetail()}).catch(function(e){toast(e.message||'获取明细失败')})}
	function renderDetail(){
		if(!currentTask)return;
		$('#detailPanel').addClass('show');
		$('#detailTitle').text((currentTask.expressCompany||'')+' 对账明细');
		var suspicious=currentItems.filter(function(i){return i.markStatus!=='green'});
		var rows=detailTab==='suspicious'?suspicious:currentItems;
		$('[data-detail-tab]').removeClass('active');
		$('[data-detail-tab="'+detailTab+'"]').addClass('active');
		$('#detailSummary').text('共 '+currentItems.length+' 条，存疑 '+suspicious.length+' 条，当前显示 '+rows.length+' 条');
		if(!rows.length){
			$('#detailRows').html('<tr class="empty-row"><td colspan="12">暂无明细</td></tr>');
			return;
		}
		$('#detailRows').html(rows.map(function(i){
			var cls=i.markStatus==='red'?'bad':(i.markStatus==='yellow'?'warn':'');
			return '<tr data-item-id="'+esc(i.id)+'"><td>'+statusTag(i.markStatus)+'</td><td>'+esc(i.waybillNumber)+'</td><td>'+esc(i.billDate||'-')+'</td><td>'+esc(i.province||'-')+'</td><td>'+esc(i.weight||'0')+'</td><td>'+esc(i.orderWeight||'0')+'</td><td>'+money(i.actualFee)+'</td><td>'+money(i.expectedFee)+'</td><td><span class="money '+cls+'">'+pct(i.deviationPercent)+'</span></td><td>'+esc(i.orderId||'-')+'</td><td>'+esc(i.reason||'-')+'</td><td><div class="mark-actions"><button class="link-btn mark-item" data-status="red" type="button">红</button><button class="link-btn mark-item" data-status="yellow" type="button">黄</button><button class="link-btn mark-item" data-status="green" type="button">绿</button></div></td></tr>';
		}).join(''));
	}
	function renderMapping(){
		var options='<option value="">不导入</option>'+importHeaders.map(function(h){
			return '<option value="'+esc(h)+'">'+esc(h)+'</option>';
		}).join('');
		$('#mappingGrid').html(fields.map(function(f){
			return '<div class="field"><label>'+esc(f.label)+(f.required?' *':'')+'</label><select class="map-select" data-field="'+esc(f.key)+'">'+options+'</select></div>';
		}).join(''));
		Object.keys(importMapping).forEach(function(k){
			$('.map-select[data-field="'+k+'"]').val(importMapping[k]);
		});
		renderPreview();
	}
	function renderPreview(){
		var validCount=importRows.filter(valid).length;
		var mappedCount=Object.keys(importMapping).filter(function(k){return importMapping[k]}).length;
		$('#importSummary').text('共读取 '+importRows.length+' 行，自动识别 '+mappedCount+' 个字段，可上传 '+validCount+' 行。');
		$('#previewHead').html(['运单号','日期/时间','重量','费用','省份','校验'].map(function(h){
			return '<th>'+h+'</th>';
		}).join(''));
		$('#previewRows').html(importRows.slice(0,50).map(function(row){
			var m=mapped(row);
			var ok=valid(row);
			return '<tr><td>'+esc(m.waybillNumber)+'</td><td>'+esc(m.billDate)+'</td><td>'+esc(m.weight)+'</td><td>'+esc(m.actualFee)+'</td><td>'+esc(m.province)+'</td><td>'+esc(ok?'通过':'忽略/缺少必要字段')+'</td></tr>';
		}).join('')||'<tr class="empty-row"><td colspan="6">暂无预览</td></tr>');
	}
	function showMapping(rows){
		importRows=rows.filter(function(row){
			return Object.keys(row).some(function(k){return cell(row[k])!==''});
		});
		importHeaders=importRows.reduce(function(headers,row){
			Object.keys(row).forEach(function(k){
				if(headers.indexOf(k)===-1)headers.push(k);
			});
			return headers;
		},[]);
		importMapping=autoMap(importHeaders);
		renderMapping();
		$('#fileModal').removeClass('show');
		$('#mapModal').addClass('show');
	}
	function readFile(file){
		var reader;
		if(!file)return;
		if(!window.XLSX){
			toast('XLSX 库未加载');
			return;
		}
		reader=new FileReader();
		reader.onload=function(e){
			try{
				var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
				var sheet=wb.Sheets[wb.SheetNames[0]];
				var rows=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:false});
				if(!rows.length)throw new Error('表格没有可读取的数据');
				showMapping(rows);
			}catch(err){
				toast(err.message||'读取表格失败');
			}
		};
		reader.readAsArrayBuffer(file);
	}
	function upload(){
		var rows=importRows.filter(valid).map(mapped);
		if(!$('#expressCompany').val()){
			toast('请选择快递公司');
			return;
		}
		if(!rows.length){
			toast('没有可上传的数据');
			return;
		}
		$('#uploadAudit').prop('disabled',true).text('上传中');
		req('/addExpressAudit/index.php',{
			expressCompany:$('#expressCompany').val(),
			extraFee:$('#extraFee').val()||0,
			rows:rows
		}).then(function(data){
			if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'上传失败');
			$('#mapModal').removeClass('show');
			toast('对账任务已生成');
			return loadTasks().then(function(){loadDetail(data.id)});
		}).catch(function(e){
			toast(e.message||'上传失败');
		}).finally(function(){
			$('#uploadAudit').prop('disabled',false).html(icon('i-upload')+'上传并对账');
		});
	}
	function exportSuspicious(taskId){
		var id=taskId||(currentTask&&currentTask.id);
		if(!id){
			toast('请选择要导出的对账任务');
			return;
		}
		function writeRows(task,items){
			var rows=(items||[]).filter(function(i){return i.markStatus!=='green'});
			if(!rows.length){
				toast('当前没有可导出的存疑数据');
				return;
			}
			var data=rows.map(function(i){
				return {'标记':statusText(i.markStatus),'运单号':i.waybillNumber,'日期':i.billDate,'省份':i.province,'账单重量':i.weight,'订单重量':i.orderWeight,'账单费用':i.actualFee,'预计费用':i.expectedFee,'偏差百分比':pct(i.deviationPercent),'订单编号':i.orderId,'说明':i.reason,'备注':i.remark};
			});
			var sheet=XLSX.utils.json_to_sheet(data);
			var wb=XLSX.utils.book_new();
			XLSX.utils.book_append_sheet(wb,sheet,'存疑数据');
			XLSX.writeFile(wb,'express-audit-suspicious-'+(task?task.id:id)+'.xlsx');
			toast('导出完成');
		}
		if(currentTask&&String(currentTask.id)===String(id)){
			writeRows(currentTask,currentItems);
			return;
		}
		req('/getExpressAuditDetail/index.php',{id:id}).then(function(data){
			if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'获取明细失败');
			writeRows(data.task,data.items||[]);
		}).catch(function(e){
			toast(e.message||'导出失败');
		});
	}
	$('#openNewTask').on('click',function(){$('#fileInput').val('');$('#extraFee').val('0');$('#fileModal').addClass('show')});
	$('#refreshTasks').on('click',loadTasks);
	$('[data-close]').on('click',function(){$('#'+$(this).attr('data-close')).removeClass('show')});
	$('.modal-backdrop').on('click',function(e){if(e.target===this)$(this).removeClass('show')});
	$('#fileInput').on('change',function(){readFile(this.files[0])});
	$('#dropZone').on('dragover',function(e){e.preventDefault();$(this).addClass('dragover')}).on('dragleave drop',function(e){e.preventDefault();$(this).removeClass('dragover');if(e.type==='drop')readFile(e.originalEvent.dataTransfer.files[0])});
	$('#mappingGrid').on('change','.map-select',function(){importMapping[$(this).attr('data-field')]=$(this).val();renderPreview()});
	$('#uploadAudit').on('click',upload);
	$('#taskRows').on('click','.continue-task',function(){loadDetail($(this).closest('tr').attr('data-id'))});
	$('#taskRows').on('click','.export-task',function(){exportSuspicious($(this).closest('tr').attr('data-id'))});
	$('#taskRows').on('click','.delete-task',function(){var id=$(this).closest('tr').attr('data-id');if(!confirm('确定删除这个对账任务？'))return;req('/delExpressAudit/index.php',{id:id}).then(function(data){if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'删除失败');if(currentTask&&String(currentTask.id)===String(id)){currentTask=null;currentItems=[];$('#detailPanel').removeClass('show')}toast('任务已删除');loadTasks()}).catch(function(e){toast(e.message||'删除失败')})});
	$('#detailRows').on('click','.mark-item',function(){var $tr=$(this).closest('tr'),status=$(this).attr('data-status');req('/updateExpressAuditItem/index.php',{itemId:$tr.attr('data-item-id'),markStatus:status,remark:'手动标记'}).then(function(data){if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'标记失败');toast('标记已更新');return loadDetail(currentTask.id).then(loadTasks)}).catch(function(e){toast(e.message||'标记失败')})});
	$('[data-detail-tab]').on('click',function(){detailTab=$(this).attr('data-detail-tab')||'all';renderDetail()});
	loadExpresses().then(loadTasks);
});
</script>
</body>

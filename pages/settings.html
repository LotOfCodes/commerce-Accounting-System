<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>系统设置</title>
<style>
	html, body {
		margin: 0;
		min-height: 100%;
		font-family: Arial, "Microsoft YaHei", sans-serif;
		background: #f5f7fb;
		color: #20242a;
	}
	.settings-page {
		box-sizing: border-box;
		min-height: 100vh;
		padding: 24px;
	}
	.page-title {
		margin: 0 0 20px;
		font-size: 22px;
		line-height: 30px;
	}
	.settings-grid {
		display: grid;
		grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
		gap: 18px;
		max-width: 1120px;
	}
	.panel {
		background: #fff;
		border: 1px solid #e2e8f0;
		border-radius: 8px;
		padding: 20px;
		box-sizing: border-box;
	}
	.panel-title {
		margin: 0 0 16px;
		font-size: 17px;
		line-height: 24px;
	}
	.form-row {
		margin-bottom: 14px;
	}
	.form-label {
		display: block;
		margin-bottom: 7px;
		font-size: 13px;
		color: #596273;
	}
	.text-input {
		width: 100%;
		height: 40px;
		padding: 0 11px;
		border: 1px solid #cbd5e1;
		border-radius: 6px;
		box-sizing: border-box;
		font-size: 14px;
		outline: none;
	}
	.text-input:focus {
		border-color: #3e7cff;
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.13);
	}
	.token-row {
		display: flex;
		gap: 8px;
	}
	.token-row .text-input {
		flex: 1;
	}
	.button-row {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
	}
	.action-button {
		height: 38px;
		padding: 0 15px;
		border: 0;
		border-radius: 6px;
		background: #3e7cff;
		color: #fff;
		font-size: 14px;
		cursor: pointer;
	}
	.action-button.secondary {
		background: #475569;
	}
	.action-button.danger {
		background: #dc2626;
	}
	.status-text {
		min-height: 20px;
		margin-top: 12px;
		font-size: 13px;
		line-height: 20px;
		color: #16a34a;
	}
	.status-text.error {
		color: #d93025;
	}
	@media (max-width: 860px) {
		.settings-grid {
			grid-template-columns: 1fr;
		}
	}
</style>
</head>
<body>
	<div class="settings-page">
		<h1 class="page-title">系统设置</h1>
		<div class="settings-grid">
			<section class="panel">
				<h2 class="panel-title">管理员密码</h2>
				<form id="passwordForm" autocomplete="off">
					<div class="form-row">
						<label class="form-label" for="oldPassword">原密码</label>
						<input class="text-input" id="oldPassword" type="password">
					</div>
					<div class="form-row">
						<label class="form-label" for="newPassword">新密码</label>
						<input class="text-input" id="newPassword" type="password">
					</div>
					<div class="form-row">
						<label class="form-label" for="confirmPassword">确认新密码</label>
						<input class="text-input" id="confirmPassword" type="password">
					</div>
					<div class="button-row">
						<button class="action-button" type="submit">修改密码</button>
					</div>
					<div class="status-text" id="passwordStatus"></div>
				</form>
			</section>
			<section class="panel">
				<h2 class="panel-title">API Token</h2>
				<div class="form-row">
					<label class="form-label" for="apiToken">当前 token</label>
					<div class="token-row">
						<input class="text-input" id="apiToken" type="password">
						<button class="action-button secondary" id="toggleToken" type="button">查看</button>
					</div>
				</div>
				<div class="button-row">
					<button class="action-button" id="saveToken" type="button">保存 token</button>
					<button class="action-button secondary" id="copyToken" type="button">复制 token</button>
					<button class="action-button danger" id="deleteToken" type="button">删除 token</button>
				</div>
				<div class="status-text" id="tokenStatus"></div>
			</section>
		</div>
	</div>
	<script>
		(function () {
			var API_BASE = '../api';
			function adminToken() {
				try { return (JSON.parse(localStorage.getItem('orders-admin-session') || '{}').token || '').trim(); }
				catch (e) { return ''; }
			}
			function setStatus(el, text, isError) {
				el.textContent = text || '';
				el.className = 'status-text' + (isError ? ' error' : '');
			}
			function syncApiToken(token) {
				if (token) {
					localStorage.setItem('orders-token', JSON.stringify({ token: token }));
				} else {
					localStorage.removeItem('orders-token');
				}
			}
			function requestJson(endpoint, payload) {
				return fetch(API_BASE + endpoint, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json;charset=UTF-8',
						'admin-token': adminToken()
					},
					body: JSON.stringify(payload || {})
				}).then(function (res) { return res.json(); }).then(function (data) {
					if (!data || !data.success) {
						throw new Error((data && data.txt) || '请求失败');
					}
					return data;
				});
			}
			var apiToken = document.getElementById('apiToken');
			var tokenStatus = document.getElementById('tokenStatus');
			var passwordStatus = document.getElementById('passwordStatus');
			requestJson('/adminSettings/index.php', {}).then(function (data) {
				apiToken.value = data.apiToken || '';
				syncApiToken(data.apiToken || '');
			}).catch(function (err) {
				setStatus(tokenStatus, err.message, true);
			});
			document.getElementById('toggleToken').addEventListener('click', function () {
				var visible = apiToken.type === 'text';
				apiToken.type = visible ? 'password' : 'text';
				this.textContent = visible ? '查看' : '隐藏';
			});
			document.getElementById('copyToken').addEventListener('click', function () {
				if (!apiToken.value) {
					setStatus(tokenStatus, '当前没有 token 可复制', true);
					return;
				}
				navigator.clipboard.writeText(apiToken.value).then(function () {
					setStatus(tokenStatus, 'token 已复制');
				}).catch(function () {
					setStatus(tokenStatus, '复制失败，请手动选择复制', true);
				});
			});
			document.getElementById('saveToken').addEventListener('click', function () {
				var value = apiToken.value.trim();
				if (!value) {
					setStatus(tokenStatus, 'API token不能为空', true);
					return;
				}
				requestJson('/updateApiToken/index.php', { apiToken: value }).then(function (data) {
					apiToken.value = data.apiToken || value;
					syncApiToken(apiToken.value);
					setStatus(tokenStatus, 'API token 已保存');
				}).catch(function (err) {
					setStatus(tokenStatus, err.message, true);
				});
			});
			document.getElementById('deleteToken').addEventListener('click', function () {
				if (!confirm('删除后，其他系统将无法再用 token 提交数据。确定删除吗？')) {
					return;
				}
				requestJson('/deleteApiToken/index.php', {}).then(function () {
					apiToken.value = '';
					syncApiToken('');
					setStatus(tokenStatus, 'API token 已删除');
				}).catch(function (err) {
					setStatus(tokenStatus, err.message, true);
				});
			});
			document.getElementById('passwordForm').addEventListener('submit', function (event) {
				event.preventDefault();
				var oldPassword = document.getElementById('oldPassword').value;
				var newPassword = document.getElementById('newPassword').value;
				var confirmPassword = document.getElementById('confirmPassword').value;
				if (newPassword.length < 6) {
					setStatus(passwordStatus, '新密码至少6位', true);
					return;
				}
				if (newPassword !== confirmPassword) {
					setStatus(passwordStatus, '两次输入的新密码不一致', true);
					return;
				}
				requestJson('/updateAdminPassword/index.php', {
					oldPassword: oldPassword,
					newPassword: newPassword
				}).then(function () {
					document.getElementById('oldPassword').value = '';
					document.getElementById('newPassword').value = '';
					document.getElementById('confirmPassword').value = '';
					setStatus(passwordStatus, '管理员密码已修改');
				}).catch(function (err) {
					setStatus(passwordStatus, err.message, true);
				});
			});
		})();
	</script>
</body>
</html>

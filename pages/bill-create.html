<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生成账单</title>
<link rel="stylesheet" href="../css/dateTimeSelector.css">
<style>
	:root {
		--bg: #f3f6fb;
		--panel: #fff;
		--line: #dfe5ef;
		--line-soft: #edf1f7;
		--text: #1f2937;
		--muted: #6b7280;
		--blue: #3e7cff;
		--blue-dark: #2f6dec;
		--green: #13a66b;
		--red: #d93025;
		--amber: #b7791f;
	}
	* { box-sizing: border-box; }
	html,
	body {
		width: 100%;
		min-height: 100%;
		margin: 0;
		font-family: Arial, "Microsoft YaHei", sans-serif;
		background: var(--bg);
		color: var(--text);
	}
	button,
	input,
	select { font-family: inherit; }
	.bill-page { min-height: 100%; padding: 14px 14px 88px; }
	.toolbar,
	.table-panel {
		background: var(--panel);
		border: 1px solid var(--line);
		border-radius: 8px;
		box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
	}
	.toolbar { padding: 14px; }
	.summary-row {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 12px;
		margin-bottom: 12px;
	}
	.page-title { margin: 0; font-size: 20px; line-height: 28px; }
	.summary-cards { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
	.total-card,
	.stat-card {
		display: inline-flex;
		align-items: center;
		gap: 8px;
		min-height: 30px;
		padding: 0 12px;
		border-radius: 6px;
		background: #eef4ff;
		color: var(--blue);
		font-size: 13px;
		font-weight: 700;
	}
	.total-card { background: #fff5f4; color: var(--red); }
	.stat-card.warning { background: #fff8e8; color: var(--amber); }
	.stat-card.danger { background: #fff5f4; color: var(--red); }
	.filter-row {
		display: grid;
		grid-template-columns: minmax(140px, 180px) minmax(130px, 160px) minmax(130px, 160px) minmax(180px, 1fr) minmax(300px, 380px) auto;
		gap: 10px;
		align-items: end;
	}
	.field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
	.field label { font-size: 12px; color: var(--muted); }
	.field input,
	.field select {
		width: 100%;
		height: 34px;
		padding: 0 10px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		outline: 0;
	}
	.field input:focus,
	.field select:focus {
		border-color: var(--blue);
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.12);
	}
	.datetime-select {
		display: inline-flex;
		align-items: center;
		width: 100%;
		height: 34px;
		padding: 0 10px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		cursor: pointer;
		user-select: none;
	}
	.datetime-select:hover { border-color: var(--blue); }
	.datetime-select .start-datetime,
	.datetime-select .end-datetime { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
	.datetime-select .time-line { width: 22px; height: 1px; margin: 0 9px; background: var(--line); }
	.datetime-select .date { font-weight: 700; }
	.datetime-select .time { color: var(--muted); }
	.action-row { display: flex; gap: 8px; }
	.btn {
		height: 34px;
		padding: 0 14px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		cursor: pointer;
		white-space: nowrap;
	}
	.btn:hover { border-color: var(--blue); color: var(--blue); }
	.btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
	.btn.primary:hover { background: var(--blue-dark); color: #fff; }
	.btn:disabled { cursor: not-allowed; opacity: 0.62; }
	.table-panel { margin-top: 14px; overflow: hidden; }
	.table-scroll { width: 100%; overflow: auto; }
	.bill-table { width: 100%; min-width: 1180px; border-collapse: collapse; }
	.bill-table th,
	.bill-table td {
		border-bottom: 1px solid var(--line-soft);
		padding: 12px;
		text-align: left;
		vertical-align: top;
		font-size: 13px;
	}
	.bill-table th { position: sticky; top: 0; z-index: 1; background: #f8fafc; color: #4b5563; font-weight: 700; }
	.meta-stack { display: grid; gap: 7px; }
	.meta-line { display: flex; align-items: flex-start; gap: 6px; line-height: 20px; }
	.meta-label { flex: 0 0 auto; color: var(--muted); }
	.meta-value { min-width: 0; word-break: break-all; }
	.money { color: var(--red); font-size: 15px; font-weight: 700; white-space: nowrap; }
	.tag {
		display: inline-flex;
		align-items: center;
		min-height: 22px;
		padding: 0 8px;
		border-radius: 999px;
		background: #e8f8f1;
		color: var(--green);
		font-size: 12px;
		font-weight: 700;
	}
	.tag.warning { background: #fff8e8; color: var(--amber); }
	.tag.danger { background: #fff5f4; color: var(--red); }
	.empty-row td,
	.loading-row td { padding: 28px 12px; text-align: center; color: var(--muted); }
	.result-bar {
		display: flex;
		align-items: center;
		justify-content: flex-end;
		gap: 16px;
		padding: 12px;
		color: var(--muted);
		font-size: 13px;
	}
	.result-bar strong { color: var(--red); font-size: 18px; }
	.bottom-tools {
		position: fixed;
		left: 0;
		right: 0;
		bottom: 0;
		display: flex;
		justify-content: center;
		gap: 8px;
		padding: 12px 14px;
		background: rgba(31, 41, 55, 0.86);
		backdrop-filter: blur(8px);
	}
	.bottom-tools .btn { border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); color: #fff; }
	.bottom-tools .btn:hover { border-color: #fff; color: #fff; }
	.toast {
		position: fixed;
		left: 50%;
		bottom: 76px;
		transform: translateX(-50%);
		display: none;
		padding: 9px 14px;
		border-radius: 6px;
		background: rgba(17, 24, 39, 0.92);
		color: #fff;
		font-size: 13px;
	}
	.toast.show { display: block; }
	@media (max-width: 1120px) {
		.filter-row { grid-template-columns: repeat(3, minmax(160px, 1fr)); }
	}
	@media (max-width: 760px) {
		.bill-page { padding: 10px 10px 88px; }
		.summary-row,
		.result-bar,
		.bottom-tools { align-items: stretch; flex-direction: column; }
		.summary-cards { justify-content: flex-start; }
		.filter-row { display: flex; flex-direction: column; }
		.action-row,
		.bottom-tools { flex-direction: row; flex-wrap: wrap; }
		.action-row .btn { flex: 1 1 120px; }
	}
</style>
</head>
<body>
	<div class="bill-page">
		<section class="toolbar">
			<div class="summary-row">
				<h1 class="page-title">生成账单</h1>
				<div class="summary-cards">
					<div class="total-card">统计总额：<span id="totalAmount">￥0.00</span></div>
					<div class="stat-card">订单总数：<span id="orderCountTop">0</span></div>
					<div class="stat-card warning">偏远地区订单：<span id="remoteCount">0</span></div>
					<div class="stat-card danger">错误订单数：<span id="errorCount">0</span></div>
				</div>
			</div>
			<div class="filter-row">
				<div class="field">
					<label for="merchantSelect">出账单商家编号</label>
					<select id="merchantSelect">
						<option value="DF08">DF08</option>
						<option value="DF11">DF11</option>
						<option value="all">全部商家</option>
					</select>
				</div>
				<div class="field">
					<label for="billStatus">账单范围</label>
					<select id="billStatus">
						<option value="ready">可出账订单</option>
						<option value="all">全部订单</option>
					</select>
				</div>
				<div class="field">
					<label for="keywordType">搜索类型</label>
					<select id="keywordType">
						<option value="order">订单号</option>
						<option value="express">快递单号</option>
						<option value="mobile">手机号</option>
					</select>
				</div>
				<div class="field">
					<label for="keyword">搜索框</label>
					<input id="keyword" type="text" placeholder="输入订单号、快递单号或手机号">
				</div>
				<div class="field">
					<label for="adddate">生成账单日期范围</label>
					<div class="datetime-select" id="adddate">
						<div class="start-datetime">
							<div class="date" year="2026" month="7" day="1">07-01</div>
							<div class="time" hour="00" minute="00" second="00">00:00:00</div>
						</div>
						<div class="time-line"></div>
						<div class="end-datetime">
							<div class="date" year="2026" month="7" day="3">07-03</div>
							<div class="time" hour="23" minute="59" second="59">23:59:59</div>
						</div>
					</div>
				</div>
				<div class="action-row">
					<button class="btn primary" type="button" id="searchOrders">搜索订单</button>
					<button class="btn" type="button" id="refreshOrders">刷新订单</button>
				</div>
			</div>
		</section>

		<section class="table-panel">
			<div class="table-scroll">
				<table class="bill-table">
					<thead>
						<tr>
							<th>订单信息</th>
							<th>商家编号</th>
							<th>收货信息数量</th>
							<th>发货内容</th>
							<th>小计</th>
							<th>状态</th>
							<th>发货时间</th>
						</tr>
					</thead>
					<tbody id="orderRows">
						<tr class="loading-row"><td colspan="7">正在获取订单数据...</td></tr>
					</tbody>
				</table>
			</div>
			<div class="result-bar">
				<span>订单数量：<span id="orderCount">0</span></span>
				<span>偏远地区订单：<span id="remoteCountBottom">0</span></span>
				<span>错误订单数：<span id="errorCountBottom">0</span></span>
				<span>总额：<strong id="resultAmount">￥0.00</strong></span>
			</div>
		</section>
	</div>

	<div class="bottom-tools">
		<button class="btn primary" type="button" id="generateBill">生成账单</button>
		<button class="btn" type="button" id="exportDraft">导出明细</button>
	</div>
	<div class="toast" id="toast">账单已生成</div>

	<div class="dateTimeSelector-wraper">
		<div class="left">
			<div class="dateTimeSelector" bid="0">
				<div class="dateTimeSelector-header">
					<div class="month-slider">
						<div class="slide-to-left"></div>
						<div class="curr-date" month="07" year="2026">2026年07月</div>
						<div class="slide-to-right"></div>
					</div>
					<div class="weeks">
						<div class="week">一</div><div class="week">二</div><div class="week">三</div><div class="week">四</div><div class="week">五</div><div class="week">六</div><div class="week">日</div>
					</div>
				</div>
				<div class="dates"></div>
				<div class="time"><select class="clock"></select><div class="colon">:</div><select class="minute"></select><div class="colon">:</div><select class="second"></select></div>
			</div>
		</div>
		<div class="right">
			<div class="dateTimeSelector" bid="1">
				<div class="dateTimeSelector-header">
					<div class="month-slider">
						<div class="slide-to-left"></div>
						<div class="curr-date" month="07" year="2026">2026年07月</div>
						<div class="slide-to-right"></div>
					</div>
					<div class="weeks">
						<div class="week">一</div><div class="week">二</div><div class="week">三</div><div class="week">四</div><div class="week">五</div><div class="week">六</div><div class="week">日</div>
					</div>
				</div>
				<div class="dates"></div>
				<div class="time"><select class="clock"></select><div class="colon">:</div><select class="minute"></select><div class="colon">:</div><select class="second"></select></div>
			</div>
		</div>
		<div class="butons"><div class="buton confirm-datetime">确定</div></div>
	</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/format-template.js"></script>
<script src="../js/dateTimeSelector.js"></script>
<script>
	$(function () {
		var API_BASE = 'https://orders.8866.info/api';
		var REMOTE_PROVINCES = ['内蒙古', '西藏', '甘肃', '青海', '宁夏', '新疆', '海南'];
		var $toast = $('#toast');
		var currentOrders = [];
		var beansByOrder = {};
		var productRules = [];
		var summary = { total: 0, orderCount: 0, remoteCount: 0, errorCount: 0 };

		function money(value) { return '￥' + (Number(value) || 0).toFixed(2); }
		function showToast(text) {
			$toast.text(text).addClass('show');
			window.clearTimeout(showToast.timer);
			showToast.timer = window.setTimeout(function () { $toast.removeClass('show'); }, 1600);
		}
		function escapeHtml(value) {
			return String(value == null ? '' : value)
				.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
		}
		function getToken() {
			try { return (JSON.parse(localStorage.getItem('orders-token') || '{}').token || '').trim(); }
			catch (error) { return ''; }
		}
		function requestJson(url, postdata) {
			return fetch(url, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json;charset=UTF-8', 'token': getToken() },
				body: JSON.stringify(postdata),
				redirect: 'follow'
			}).then(function (res) { return res.json(); });
		}
		function datePart($node) {
			var month = String($node.attr('month') || '').padStart(2, '0');
			var day = String($node.attr('day') || '').padStart(2, '0');
			return $node.attr('year') + '-' + month + '-' + day;
		}
		function timePart($node) {
			return String($node.attr('hour') || '00').padStart(2, '0') + ':' +
				String($node.attr('minute') || '00').padStart(2, '0') + ':' +
				String($node.attr('second') || '00').padStart(2, '0');
		}
		function getStartTime() { return datePart($('#adddate .start-datetime .date')) + ' ' + timePart($('#adddate .start-datetime .time')); }
		function getEndTime() { return datePart($('#adddate .end-datetime .date')) + ' ' + timePart($('#adddate .end-datetime .time')); }
		function getBillDateRange() { return getStartTime() + ' 至 ' + getEndTime(); }
		function statusText(value) {
			var map = { '1': '待发货', '2': '已发货', '3': '已回收', 'WAIT_SEND': '待发货', 'SENT': '已发货', 'RECYCLED': '已回收' };
			return map[value] || value || '-';
		}
		function getOrderBeans(orderId) { return beansByOrder[orderId] || []; }
		function getBeanQty(bean) {
			var qty = Number(bean.total || bean.quantity || 0);
			return qty > 0 ? qty : 1;
		}
		function numberFrom(value) {
			var text = String(value == null ? '' : value).replace(/,/g, '');
			var match = text.match(/-?\d+(\.\d+)?/);
			return match ? Number(match[0]) : 0;
		}
		function normalizeName(value) { return String(value || '').toLowerCase().replace(/\s+/g, ''); }
		function findProductRule(sku) {
			var normalizedSku = normalizeName(sku);
			if (!normalizedSku) { return null; }
			return productRules.find(function (rule) {
				var name = normalizeName(rule.product_name || rule.productName || '');
				if (!name) { return false; }
				return normalizedSku.indexOf(name) > -1 || name.indexOf(normalizedSku) > -1;
			}) || null;
		}
		function hasRemotePrice(rule) { return numberFrom(rule && (rule.remotePrice || rule.far_price)) > 0; }
		function isRemoteOrder(order) {
			var province = String(order.receiverProvince || '');
			return REMOTE_PROVINCES.some(function (name) { return province.indexOf(name) > -1; });
		}
		function calcBean(bean, order) {
			var qty = getBeanQty(bean);
			var rule = findProductRule(bean.sku);
			var unitPrice = numberFrom(rule && rule.price);
			var remotePrice = isRemoteOrder(order) ? numberFrom(rule && (rule.remotePrice || rule.far_price)) : 0;
			var packPrice = numberFrom(rule && rule.packPrice);
			var subtotal = (unitPrice * qty) + remotePrice + packPrice;
			return { qty: qty, rule: rule, unitPrice: unitPrice, remotePrice: remotePrice, packPrice: packPrice, subtotal: subtotal, error: !rule || unitPrice <= 0 };
		}
		function calcOrder(order) {
			var beans = getOrderBeans(order.orderId);
			var hasRemote = isRemoteOrder(order);
			var totalQty = 0;
			var total = 0;
			var hasError = !beans.length;
			beans.forEach(function (bean) {
				var calc = calcBean(bean, order);
				totalQty += calc.qty;
				total += calc.subtotal;
				if (calc.error) { hasError = true; }
			});
			return { totalQty: totalQty, total: total, hasRemote: hasRemote, hasError: hasError };
		}
		function renderGoods(order) {
			var beans = getOrderBeans(order.orderId);
			if (!beans.length) { return '<div class="meta-line"><span class="tag danger">缺少发货内容</span></div>'; }
			return beans.map(function (bean) {
				var calc = calcBean(bean, order);
				var ruleName = calc.rule ? (calc.rule.product_name || calc.rule.productName || '-') : '未匹配产品';
				return [
					'<div class="meta-stack">',
					'<div class="meta-line"><span class="meta-label">商品：</span><span class="meta-value">' + escapeHtml(bean.sku || '-') + '</span></div>',
					'<div class="meta-line"><span class="meta-label">匹配：</span><span class="meta-value">' + escapeHtml(ruleName) + '</span>' + (calc.error ? '<span class="tag danger">错误</span>' : '') + '</div>',
					'<div class="meta-line"><span class="meta-label">数量：</span><span class="meta-value">' + escapeHtml(calc.qty) + '</span><span class="meta-label">重量：</span><span class="meta-value">' + escapeHtml(bean.weightActual || '-') + '</span></div>',
					'<div class="meta-line"><span class="meta-label">金额：</span><span class="meta-value">单价 ' + money(calc.unitPrice) + '，偏远 ' + money(calc.remotePrice) + '，包装 ' + money(calc.packPrice) + '</span></div>',
					'</div>'
				].join('');
			}).join('');
		}
		function renderRows() {
			var html = '';
			summary = { total: 0, orderCount: currentOrders.length, remoteCount: 0, errorCount: 0 };
			if (!currentOrders.length) {
				html = '<tr class="empty-row"><td colspan="7">暂无订单数据</td></tr>';
			} else {
				html = currentOrders.map(function (order) {
					var calc = calcOrder(order);
					summary.total += calc.total;
					if (calc.hasRemote) { summary.remoteCount += 1; }
					if (calc.hasError) { summary.errorCount += 1; }
					return [
						'<tr data-order-id="' + escapeHtml(order.orderId || '') + '">',
						'<td><div class="meta-stack">',
						'<div class="meta-line"><span class="meta-label">订单编号：</span><span class="meta-value">' + escapeHtml(order.orderId || '-') + '</span></div>',
						'<div class="meta-line"><span class="meta-label">平台单号：</span><span class="meta-value">' + escapeHtml(order.platId || '-') + '</span></div>',
						'<div class="meta-line"><span class="meta-label">收件人：</span><span class="meta-value">' + escapeHtml(order.receiverName || '-') + ' ' + escapeHtml(order.receiverMobile || '-') + '</span></div>',
						'<div class="meta-line"><span class="meta-label">地址：</span><span class="meta-value">' + escapeHtml((order.receiverProvince || '') + (order.receiverAddress || '')) + '</span></div>',
						'</div></td>',
						'<td>' + escapeHtml(order.customer || '-') + '</td>',
						'<td>' + escapeHtml(calc.totalQty || getOrderBeans(order.orderId).length || 0) + '</td>',
						'<td>' + renderGoods(order) + '</td>',
						'<td><span class="money">' + money(calc.total) + '</span></td>',
						'<td><div class="meta-stack">' + (calc.hasRemote ? '<span class="tag warning">偏远地区</span>' : '<span class="tag">正常</span>') + (calc.hasError ? '<span class="tag danger">需处理</span>' : '') + '<span>' + escapeHtml(statusText(order.tradeStatus)) + '</span></div></td>',
						'<td>' + escapeHtml(order.deliveryTime || '-') + '</td>',
						'</tr>'
					].join('');
				}).join('');
			}
			$('#orderRows').html(html);
			updateSummary();
		}
		function updateSummary() {
			$('#totalAmount, #resultAmount').text(money(summary.total));
			$('#orderCount, #orderCountTop').text(summary.orderCount);
			$('#remoteCount, #remoteCountBottom').text(summary.remoteCount);
			$('#errorCount, #errorCountBottom').text(summary.errorCount);
		}
		function setLoading() {
			$('#orderRows').html('<tr class="loading-row"><td colspan="7">正在获取订单数据...</td></tr>');
			summary = { total: 0, orderCount: 0, remoteCount: 0, errorCount: 0 };
			updateSummary();
		}
		function loadBeans(orderId) {
			return requestJson(API_BASE + '/getBeans/index.php', { orderId: orderId }).then(function (data) {
				beansByOrder[orderId] = data && data.success && Array.isArray(data.data) ? data.data : [];
			}).catch(function () { beansByOrder[orderId] = []; });
		}
		function loadProductRules() {
			return requestJson(API_BASE + '/getParentProducts/index.php', {}).then(function (data) {
				productRules = data && data.success && Array.isArray(data.data) ? data.data : [];
			}).catch(function () { productRules = []; });
		}
		function searchPayload() {
			return {
				page: 1,
				pageSize: 500,
				startTime: getStartTime(),
				endTime: getEndTime(),
				merchant: $('#merchantSelect').val(),
				status: $('#billStatus').val() === 'ready' ? 'ready' : 'all',
				keywordType: $('#keywordType').val(),
				keyword: ($('#keyword').val() || '').trim()
			};
		}
		function loadOrders() {
			if (!getToken()) { showToast('请先在登录页输入密钥'); }
			setLoading();
			$('#searchOrders, #refreshOrders').prop('disabled', true);
			return Promise.all([
				requestJson(API_BASE + '/getOrders/index.php', searchPayload()),
				loadProductRules()
			]).then(function (results) {
				var data = results[0];
				if (!data || !data.success || !Array.isArray(data.data)) {
					throw new Error(data && data.txt ? data.txt : '获取订单失败');
				}
				currentOrders = data.data;
				beansByOrder = {};
				return Promise.all(currentOrders.map(function (order) { return loadBeans(order.orderId); }));
			}).then(function () {
				renderRows();
				showToast('订单数据已更新');
			}).catch(function (error) {
				currentOrders = [];
				beansByOrder = {};
				renderRows();
				showToast(error.message || '获取订单失败');
			}).finally(function () {
				$('#searchOrders, #refreshOrders').prop('disabled', false);
			});
		}

		$('#searchOrders, #refreshOrders').on('click', loadOrders);
		$('#keyword').on('keydown', function (event) { if (event.key === 'Enter') { loadOrders(); } });
		$('#generateBill').on('click', function () {
			renderRows();
			showToast('账单已生成，' + getBillDateRange() + '，统计总额 ' + $('#resultAmount').text());
		});
		$('#exportDraft').on('click', function () {
			showToast('导出明细：共 ' + summary.orderCount + ' 个订单');
		});

		loadOrders();
	});
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生成账单</title>
<link rel="stylesheet" href="../css/dateTimeSelector.css">
<style>
	:root {
		--bg: #f3f6fb;
		--panel: #fff;
		--line: #dfe5ef;
		--line-soft: #edf1f7;
		--text: #1f2937;
		--muted: #6b7280;
		--blue: #3e7cff;
		--blue-dark: #2f6dec;
		--green: #13a66b;
		--red: #d93025;
		--amber: #b7791f;
	}
	* { box-sizing: border-box; }
	html,
	body {
		width: 100%;
		min-height: 100%;
		margin: 0;
		font-family: Arial, "Microsoft YaHei", sans-serif;
		background: var(--bg);
		color: var(--text);
	}
	button,
	input,
	select { font-family: inherit; }
	.bill-page { min-height: 100%; padding: 14px 14px 88px; }
	.toolbar,
	.table-panel {
		background: var(--panel);
		border: 1px solid var(--line);
		border-radius: 8px;
		box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
	}
	.toolbar {
		position: sticky;
		top: 0;
		z-index: 20;
		padding: 14px;
	}
	.summary-row {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 12px;
		margin-bottom: 12px;
	}
	.page-title { margin: 0; font-size: 20px; line-height: 28px; }
	.summary-cards { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
	.total-card,
	.stat-card {
		display: inline-flex;
		align-items: center;
		gap: 8px;
		min-height: 30px;
		padding: 0 12px;
		border-radius: 6px;
		background: #eef4ff;
		color: var(--blue);
		font-size: 13px;
		font-weight: 700;
	}
	.total-card { background: #fff5f4; color: var(--red); }
	.stat-card.warning { background: #fff8e8; color: var(--amber); }
	.stat-card.danger { background: #fff5f4; color: var(--red); }
	.remote-jump,
	.error-jump,
	.unbound-jump {
		border: 0;
		cursor: pointer;
	}
	.remote-jump:hover {
		box-shadow: inset 0 0 0 1px rgba(183, 121, 31, 0.28);
	}
	.error-jump:hover {
		box-shadow: inset 0 0 0 1px rgba(217, 48, 37, 0.25);
	}
	.unbound-jump:hover {
		box-shadow: inset 0 0 0 1px rgba(62, 124, 255, 0.24);
	}
	.filter-row {
		display: grid;
		grid-template-columns: minmax(130px, 170px) minmax(130px, 170px) minmax(120px, 150px) minmax(120px, 150px) minmax(120px, 150px) minmax(150px, 180px) minmax(150px, 180px) auto;
		gap: 10px;
		align-items: end;
	}
	.field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
	.keyword-field { max-width: 180px; }
	.date-range-field { grid-column: 1 / span 7; }
	.field label { font-size: 12px; color: var(--muted); }
	.field input,
	.field select {
		width: 100%;
		height: 34px;
		padding: 0 10px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		outline: 0;
	}
	.field input:focus,
	.field select:focus {
		border-color: var(--blue);
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.12);
	}
	.field select:disabled {
		cursor: not-allowed;
		background: #f3f6fb;
		color: var(--muted);
	}
	.quantity-filter {
		display: grid;
		gap: 6px;
	}
	.quantity-range-inputs {
		display: none;
		grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
		align-items: center;
		gap: 6px;
	}
	.quantity-range-inputs.show {
		display: grid;
	}
	.quantity-range-sep {
		color: var(--muted);
		font-size: 13px;
	}
	.datetime-select {
		display: inline-flex;
		align-items: center;
		width: 100%;
		height: 34px;
		padding: 0 10px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		cursor: pointer;
		user-select: none;
	}
	.datetime-select:hover { border-color: var(--blue); }
	.datetime-select .start-datetime,
	.datetime-select .end-datetime { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
	.datetime-select .time-line { width: 22px; height: 1px; margin: 0 9px; background: var(--line); }
	.datetime-select .date { font-weight: 700; }
	.datetime-select .time { color: var(--muted); }
	.date-range-field .datetime-select { width: max-content; max-width: 100%; }
	.action-row { display: flex; gap: 8px; }
	.btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		gap: 6px;
		height: 34px;
		padding: 0 14px;
		border: 1px solid var(--line);
		border-radius: 6px;
		background: #fff;
		color: var(--text);
		font-size: 13px;
		cursor: pointer;
		white-space: nowrap;
	}
	.btn:hover { border-color: var(--blue); color: var(--blue); }
	.btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
	.btn.primary:hover { background: var(--blue-dark); color: #fff; }
	.btn:disabled { cursor: not-allowed; opacity: 0.62; }
	.icon {
		width: 15px;
		height: 15px;
		flex: 0 0 auto;
		stroke: currentColor;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
		fill: none;
	}
	.icon-sprite {
		position: absolute;
		width: 0;
		height: 0;
		overflow: hidden;
	}
	.table-panel { margin-top: 14px; overflow: hidden; }
	.table-scroll { width: 100%; overflow: auto; }
	.bill-table { width: 100%; min-width: 1280px; border-collapse: collapse; }
	.bill-table th,
	.bill-table td {
		border-bottom: 1px solid var(--line-soft);
		padding: 12px;
		text-align: left;
		vertical-align: top;
		font-size: 13px;
	}
	.bill-table th { position: sticky; top: 0; z-index: 1; background: #f8fafc; color: #4b5563; font-weight: 700; }
	.bill-table tbody tr:hover { background: #fbfdff; }
	.bill-table tbody tr[data-order-id] { cursor: pointer; }
	.bill-table tbody tr.is-selected {
		background: #eef4ff;
		box-shadow: inset 4px 0 0 var(--blue);
	}
	.bill-table tr.remote-target,
	.bill-table tr.error-target,
	.bill-table tr.unbound-target {
		background: #fffdf8;
	}
	.bill-table tr.remote-focus {
		background: #fff8e8;
		box-shadow: inset 4px 0 0 var(--amber);
	}
	.bill-table tr.error-focus {
		background: #fff8e8;
		box-shadow: inset 4px 0 0 var(--red);
	}
	.bill-table tr.unbound-focus {
		background: #f7faff;
		box-shadow: inset 4px 0 0 var(--blue);
	}
	.order-meta,
	.shop-meta,
	.bill-status-meta,
	.meta-stack { display: grid; gap: 7px; }
	.meta-line { display: flex; align-items: flex-start; gap: 6px; line-height: 20px; }
	.meta-label { flex: 0 0 auto; color: var(--muted); }
	.meta-value { min-width: 0; word-break: break-all; }
	.copy-btn {
		flex: 0 0 auto;
		display: inline-flex;
		align-items: center;
		justify-content: center;
		gap: 4px;
		height: 22px;
		padding: 0 8px;
		border: 1px solid #cfe0ff;
		border-radius: 5px;
		background: #f3f7ff;
		color: var(--blue);
		font-size: 12px;
		cursor: pointer;
	}
	.copy-btn .icon {
		width: 12px;
		height: 12px;
	}
	.goods-meta {
		display: grid;
		gap: 7px;
	}
	.goods-item {
		display: grid;
		grid-template-columns: minmax(0, 1fr);
		gap: 10px;
		align-items: start;
		padding: 10px;
		border: 1px solid var(--line-soft);
		border-radius: 8px;
		background: #fbfdff;
	}
	.goods-item + .goods-item { margin-top: 8px; }
	.goods-main {
		display: grid;
		grid-template-columns: 64px minmax(0, 1fr);
		gap: 12px;
		align-items: start;
		min-width: 0;
	}
	.goods-thumb {
		width: 64px;
		height: 64px;
		border: 1px solid var(--line-soft);
		border-radius: 6px;
		background: #f8fafc;
		object-fit: cover;
	}
	.goods-detail {
		display: grid;
		gap: 7px;
		min-width: 0;
	}
	.goods-title-row {
		display: flex;
		align-items: flex-start;
		gap: 8px;
	}
	.goods-name {
		min-width: 0;
		font-weight: 700;
		word-break: break-all;
	}
	.goods-qty {
		flex: 0 0 auto;
		color: var(--red);
		font-weight: 700;
		white-space: nowrap;
	}
	.goods-subline {
		display: flex;
		flex-wrap: wrap;
		align-items: center;
		gap: 6px 12px;
		color: var(--muted);
		line-height: 20px;
	}
	.goods-subline .meta-value { color: var(--text); }
	.goods-subline a.meta-value {
		color: var(--blue);
		text-decoration: none;
	}
	.goods-subline a.meta-value:hover { text-decoration: underline; }
	.goods-express {
		display: grid;
		gap: 6px;
		padding: 8px 10px;
		border: 1px solid #dbe7ff;
		border-radius: 6px;
		background: #f7faff;
	}
	.goods-cell-head {
		display: flex;
		align-items: center;
		justify-content: flex-end;
		margin-bottom: 8px;
	}
	.icon-btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 30px;
		height: 30px;
		padding: 0;
		border: 1px solid #cfe0ff;
		border-radius: 6px;
		background: #f3f7ff;
		color: var(--blue);
		cursor: pointer;
		box-shadow: 0 1px 2px rgba(31, 41, 55, 0.04);
	}
	.icon-btn:hover {
		border-color: var(--blue);
		background: #eef4ff;
		color: var(--blue-dark);
	}
	.icon-btn:disabled {
		cursor: not-allowed;
		opacity: 0.62;
	}
	.icon-btn.is-loading .icon {
		animation: spin 0.8s linear infinite;
	}
	@keyframes spin {
		to { transform: rotate(360deg); }
	}
	.money { color: var(--red); font-size: 16px; font-weight: 700; white-space: nowrap; }
	.tag {
		display: inline-flex;
		align-items: center;
		min-height: 22px;
		padding: 0 8px;
		border-radius: 999px;
		background: #e8f8f1;
		color: var(--green);
		font-size: 12px;
		font-weight: 700;
	}
	.tag.warning { background: #fff8e8; color: var(--amber); }
	.tag.danger { background: #fff5f4; color: var(--red); }
	.empty-row td,
	.loading-row td { padding: 28px 12px; text-align: center; color: var(--muted); }
	.result-bar {
		display: flex;
		align-items: center;
		justify-content: flex-end;
		gap: 16px;
		padding: 12px;
		color: var(--muted);
		font-size: 13px;
	}
	.result-bar strong { color: var(--red); font-size: 18px; }
	.result-link {
		border: 0;
		background: transparent;
		color: inherit;
		font: inherit;
		cursor: pointer;
	}
	.result-link:hover {
		color: var(--red);
	}
	.bottom-tools {
		position: fixed;
		left: 0;
		right: 0;
		bottom: 0;
		display: flex;
		justify-content: center;
		gap: 8px;
		padding: 12px 14px;
		background: rgba(31, 41, 55, 0.86);
		backdrop-filter: blur(8px);
	}
	.bottom-tools .btn { border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); color: #fff; }
	.bottom-tools .btn:hover { border-color: #fff; color: #fff; }
	.toast {
		position: fixed;
		left: 50%;
		bottom: 76px;
		transform: translateX(-50%);
		display: none;
		padding: 9px 14px;
		border-radius: 6px;
		background: rgba(17, 24, 39, 0.92);
		color: #fff;
		font-size: 13px;
	}
	.toast.show { display: block; }
	.modal-backdrop {
		position: fixed;
		inset: 0;
		z-index: 40;
		display: none;
		align-items: center;
		justify-content: center;
		padding: 18px;
		background: rgba(15, 23, 42, 0.48);
	}
	.modal-backdrop.show { display: flex; }
	.modal {
		width: min(980px, 100%);
		max-height: calc(100vh - 36px);
		overflow: hidden;
		display: flex;
		flex-direction: column;
		border-radius: 8px;
		background: #fff;
		box-shadow: 0 18px 50px rgba(15, 23, 42, 0.26);
	}
	.modal-head,
	.modal-actions {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 10px;
		padding: 14px;
		border-bottom: 1px solid var(--line-soft);
	}
	.modal-actions {
		justify-content: flex-end;
		border-top: 1px solid var(--line-soft);
		border-bottom: 0;
	}
	.modal-title {
		margin: 0;
		font-size: 18px;
		line-height: 26px;
	}
	.modal-body {
		overflow: auto;
		display: grid;
		gap: 14px;
		padding: 14px;
	}
	.order-form {
		display: grid;
		grid-template-columns: repeat(3, minmax(180px, 1fr));
		gap: 12px;
	}
	.order-form .field.wide { grid-column: span 3; }
	.order-form textarea {
		width: 100%;
		min-height: 78px;
		padding: 9px 10px;
		border: 1px solid var(--line);
		border-radius: 6px;
		outline: 0;
		resize: vertical;
		color: var(--text);
		font: inherit;
	}
	.order-form textarea:focus {
		border-color: var(--blue);
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.12);
	}
	.order-form input[readonly] {
		background: #f8fafc;
		color: var(--muted);
		cursor: not-allowed;
	}
	.order-beans-panel {
		display: grid;
		gap: 10px;
		margin-top: 4px;
		padding-top: 14px;
		border-top: 1px solid var(--line-soft);
	}
	.order-beans-head {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 10px;
	}
	.order-beans-title {
		margin: 0;
		font-size: 15px;
		line-height: 22px;
	}
	.bean-editor-list {
		display: grid;
		gap: 10px;
	}
	.bean-editor-row {
		display: grid;
		grid-template-columns: minmax(220px, 1.6fr) minmax(90px, .6fr) minmax(110px, .8fr) minmax(180px, 1.2fr) auto;
		gap: 8px;
		align-items: end;
		padding: 10px;
		border: 1px solid var(--line-soft);
		border-radius: 8px;
		background: #fbfdff;
	}
	.bean-editor-row .field { gap: 5px; }
	.bean-editor-row .btn {
		height: 34px;
		padding: 0 10px;
	}
	@media (max-width: 1120px) {
		.filter-row { grid-template-columns: repeat(3, minmax(160px, 1fr)); }
		.date-range-field { grid-column: 1 / span 2; }
		.bean-editor-row { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
	}
	@media (max-width: 760px) {
		.bill-page { padding: 10px 10px 88px; }
		.summary-row,
		.result-bar,
		.bottom-tools { align-items: stretch; flex-direction: column; }
		.summary-cards { justify-content: flex-start; }
		.filter-row { display: flex; flex-direction: column; }
		.date-range-field .datetime-select { width: 100%; }
		.action-row,
		.bottom-tools { flex-direction: row; flex-wrap: wrap; }
		.action-row .btn { flex: 1 1 120px; }
		.datetime-select {
			height: auto;
			align-items: flex-start;
			flex-direction: column;
			gap: 6px;
			padding: 8px 10px;
		}
		.datetime-select .time-line {
			width: 100%;
			margin: 0;
		}
		.goods-main {
			grid-template-columns: 52px minmax(0, 1fr);
		}
		.goods-thumb {
			width: 52px;
			height: 52px;
		}
		.goods-item { padding: 8px; }
		.order-form { grid-template-columns: 1fr; }
		.order-form .field.wide { grid-column: auto; }
		.bean-editor-row { grid-template-columns: 1fr; }
	}
</style>
</head>
<body>
	<svg class="icon-sprite" aria-hidden="true">
		<symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></symbol>
		<symbol id="i-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4"></path><path d="M21 3v6h-6"></path></symbol>
		<symbol id="i-receipt" viewBox="0 0 24 24"><path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 1 .7V2Z"></path><path d="M8 7h8"></path><path d="M8 11h8"></path><path d="M8 15h5"></path></symbol>
		<symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></symbol>
		<symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></symbol>
		<symbol id="i-edit" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></symbol>
		<symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></symbol>
		<symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></symbol>
	</svg>
	<div class="bill-page">
		<section class="toolbar">
			<div class="summary-row">
				<h1 class="page-title">生成账单</h1>
				<div class="summary-cards">
					<div class="total-card">统计总额：<span id="totalAmount">0.00</span></div>
					<div class="stat-card">订单总数：<span id="orderCountTop">0</span></div>
					<button class="stat-card unbound-jump" type="button">未绑定订单数：<span id="unboundCount">0</span></button>
					<button class="stat-card warning remote-jump" type="button">偏远地区订单：<span id="remoteCount">0</span></button>
					<button class="stat-card danger error-jump" type="button">错误订单数：<span id="errorCount">0</span></button>
				</div>
			</div>
			<div class="filter-row">
				<div class="field">
					<label for="merchantSelect">出账单商家编号</label>
					<select id="merchantSelect">
						<option value="all" selected>全部商家</option>
					</select>
				</div>
				<div class="field">
					<label for="shopSelect">店铺</label>
					<select id="shopSelect">
						<option value="all" selected>全部店铺</option>
					</select>
				</div>
				<div class="field">
					<label for="billStatus">账单范围</label>
					<select id="billStatus">
						<option value="ready">可出账订单</option>
						<option value="all" selected>全部订单</option>
					</select>
				</div>
				<div class="field">
					<label for="orderTypeFilter">订单类型</label>
					<select id="orderTypeFilter">
						<option value="all" selected>全部类型</option>
						<option value="1">手工订单</option>
						<option value="2">平台订单</option>
					</select>
				</div>
				<div class="field">
					<label for="keywordType">搜索类型</label>
					<select id="keywordType">
						<option value="order">订单号</option>
						<option value="express">快递单号</option>
						<option value="goods">商品名</option>
						<option value="mobile">手机号</option>
					</select>
				</div>
				<div class="field keyword-field">
					<label for="keyword">搜索框</label>
					<input id="keyword" type="text" placeholder="输入关键词">
				</div>
				<div class="field">
					<label for="quantityRangeFilter">商品数量范围</label>
					<div class="quantity-filter">
						<select id="quantityRangeFilter">
							<option value="">全部数量</option>
							<option value="single">单件</option>
							<option value="multi">多件</option>
							<option value="custom">输入数量</option>
						</select>
						<div class="quantity-range-inputs" id="quantityRangeInputs">
							<input id="quantityMinFilter" type="number" min="0" step="1" inputmode="numeric" placeholder="最小">
							<span class="quantity-range-sep">至</span>

<script src="../js/jquery.min.js"></script>

<script>
	$(function () {
		var API_BASE = '../api';
		var REMOTE_PROVINCES = ['辽宁', '吉林', '黑龙江', '内蒙古', '甘肃', '宁夏', '新疆', '西藏', '青海'];
		var $toast = $('#toast');
		var currentOrders = [];
		var beansByOrder = {};
		var productRules = [];
		var auditWeightByWaybill = {};
		var tearOrderByWaybill = {};
		var merchants = [];
		var summary = { total: 0, orderCount: 0, remoteCount: 0, errorCount: 0, unboundCount: 0 };
		var errorJumpIndex = -1;
		var remoteJumpIndex = -1;
		var unboundJumpIndex = -1;
		var availableOrders = [];
		var loadOrdersSeq = 0;
		var ORDER_BEAN_CONCURRENCY = 4;
		var selectedOrderId = '';

		function money(value) { return (Number(value) || 0).toFixed(2); }
		function showToast(text) {
			$toast.text(text).addClass('show');
			window.clearTimeout(showToast.timer);
			showToast.timer = window.setTimeout(function () { $toast.removeClass('show'); }, 1600);
		}
		function escapeHtml(value) {
			return String(value == null ? '' : value)
				.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
		}
		function matchKey(value) {
			return String(value == null ? '' : value).toLowerCase().replace(/[^\u4e00-\u9fa5a-z0-9]/g, '');
		}
		function normalizeWaybill(value) {
			return String(value == null ? '' : value).toUpperCase().replace(/[^A-Z0-9]/g, '');
		}
		function extractWaybillNumbers(value) {
			var text = String(value == null ? '' : value).toUpperCase();
			var matches = text.match(/[A-Z]{1,6}\d{6,24}|\d{10,24}/g) || [];
			return matches.map(normalizeWaybill).filter(Boolean);
		}
		function addMatchValue(values, value) {
			var key = matchKey(value);
			if (key) { values[key] = true; }
		}
		function getToken() {
			try { return (JSON.parse(localStorage.getItem('orders-token') || '{}').token || '').trim(); }
			catch (error) { return ''; }
		}
		function requestJson(url, postdata) {
			return fetch(url, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json;charset=UTF-8', 'token': getToken() },
				body: JSON.stringify(postdata),
				redirect: 'follow'
			}).then(function (res) { return res.json(); });
		}
		function delay(ms) {
			return new Promise(function (resolve) {
				window.setTimeout(resolve, ms);
			});
		}
		function requestJsonRetry(url, postdata, retries) {
			var left = Math.max(0, parseInt(retries, 10) || 0);
			return requestJson(url, postdata).then(function (data) {
				if (data && data.success === false) {
					throw new Error(data.txt || '请求失败');
				}
				return data;
			}).catch(function (error) {
				if (left <= 0) { throw error; }
				return delay((4 - left) * 250).then(function () {
					return requestJsonRetry(url, postdata, left - 1);
				});
			});
		}
		function pad2(value) {
			value = parseInt(value, 10);
			return (value < 10 ? '0' : '') + value;
		}
		function cellText(value) {
			if (value == null) { return ''; }
			if (value instanceof Date) { return formatDateTime(value); }
			return String(value).trim();
		}
		function formatDateTime(date) {
			return date.getFullYear() + '-' + pad2(date.getMonth() + 1) + '-' + pad2(date.getDate()) + ' ' + pad2(date.getHours()) + ':' + pad2(date.getMinutes()) + ':' + pad2(date.getSeconds());
		}
		function normalizeDateTime(value) {
			var text = cellText(value);
			var match;
			if (!text) { return ''; }
			match = text.match(/^(\d{4})[\/.-](\d{1,2})[\/.-](\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
			if (match) {
				return match[1] + '-' + pad2(match[2]) + '-' + pad2(match[3]) + ' ' + pad2(match[4] || 0) + ':' + pad2(match[5] || 0) + ':' + pad2(match[6] || 0);
			}
			return text;
		}
		function merchantLabel(merchant) {
			var code = merchant.mid || '';
			var name = merchant.merchantName || '';
			return code && name ? code + ' - ' + name : (code || name || '-');
		}
		function shopValue(shop) { return shop.shopCode || shop.shopName || ''; }
		function shopLabel(shop) {
			var code = shop.shopCode || '';
			var name = shop.shopName || '';
			return code && name ? code + ' - ' + name : (name || code || '-');
		}
		function merchantShopValues(merchant) {
			var values = {};
			if (!merchant) { return values; }
			if (merchant.id) { addMatchValue(values, merchant.id); }
			if (merchant.mid) { addMatchValue(values, merchant.mid); }
			if (merchant.merchantName) { addMatchValue(values, merchant.merchantName); }
			if (Array.isArray(merchant.shops)) {
				merchant.shops.forEach(function (shop) {
					if (shop.shopCode) { addMatchValue(values, shop.shopCode); }
					if (shop.shopName) { addMatchValue(values, shop.shopName); }
				});
			}
			return values;
		}
		function orderShopOptionKeys(orders) {
			var keys = {};
			(orders || []).forEach(function (order) {
				if (orderTypeValue(order.orderType) === '1') { return; }
				addMatchValue(keys, order.shopName);
				addMatchValue(keys, order.customer);
			});
			return keys;
		}
		function shopMatchesOrderShopKeys(shop, keys) {
			return keys[matchKey(shopValue(shop))] || keys[matchKey(shop.shopCode)] || keys[matchKey(shop.shopName)];
		}
		function appendUnboundShopOptions(html, seen, selectedMerchantId) {
			var merchant = selectedMerchantId && selectedMerchantId !== 'all' ? selectedMerchant() : null;
			var merchantValues = merchantShopValues(merchant);
			var boundShopNames = {};
			merchants.forEach(function (item) {
				if (!Array.isArray(item.shops)) { return; }
				item.shops.forEach(function (shop) {
					if (shop.shopName) { addMatchValue(boundShopNames, shop.shopName); }
					if (shop.shopCode) { addMatchValue(boundShopNames, shop.shopCode); }
				});
			});
			availableOrders.forEach(function (order) {
				if (orderTypeValue(order.orderType) === '1') { return; }
				var shopName = String(order.shopName || '').trim();
				var customer = String(order.customer || '').trim();
				var shopKey = matchKey(shopName);
				if (!shopName || seen[shopKey] || boundShopNames[shopKey]) { return; }
				if (merchant && !merchantValues[matchKey(customer)] && !merchantValues[shopKey]) { return; }
				seen[shopKey] = true;
				html += '<option value="' + escapeHtml(shopName) + '">' + escapeHtml(shopName + '(未绑定)') + '</option>';
			});
			return html;
		}
		function renderMerchantOptions() {
			var selectedMerchant = $('#merchantSelect').val() || 'all';
			var html = '<option value="all">全部商家</option>';
			html += merchants.map(function (merchant) {
				return '<option value="' + escapeHtml(merchant.id || '') + '" data-mid="' + escapeHtml(merchant.mid || '') + '">' + escapeHtml(merchantLabel(merchant)) + '</option>';
			}).join('');
			$('#merchantSelect').html(html).val(selectedMerchant);
			if ($('#merchantSelect').val() !== selectedMerchant) { $('#merchantSelect').val('all'); }
			renderShopOptions();
		}
		function renderEditMerchantOptions(selectedCustomer) {
			var selected = String(selectedCustomer || '').trim();
			var matchedValue = '';
			var html = '<option value="">请选择商家</option>';
			html += merchants.map(function (merchant) {
				var code = String(merchant.mid || '').trim();
				if (!code) { return ''; }
				if (selected && (matchKey(selected) === matchKey(code) || matchKey(selected) === matchKey(merchant.id) || matchKey(selected) === matchKey(merchant.merchantName))) {
					matchedValue = code;
				}
				return '<option value="' + escapeHtml(code) + '" data-id="' + escapeHtml(merchant.id || '') + '" data-mid="' + escapeHtml(code) + '">' + escapeHtml(merchantLabel(merchant)) + '</option>';
			}).join('');
			$('#editCustomer').html(html).val(matchedValue || '');
		}
		function currentSelectedMerchantCode() {
			return $('#merchantSelect option:selected').attr('data-mid') || '';
		}
		function syncShopSelectLock() {
			var isManual = $('#orderTypeFilter').val() === '1';
			if (isManual) {
				$('#shopSelect').val('all');
			}
			$('#shopSelect').prop('disabled', isManual);
		}
		function renderShopOptions() {
			var selectedMerchant = $('#merchantSelect').val() || 'all';
			var selectedShop = $('#shopSelect').val() || 'all';
			var shops = [];
			var shopOptionKeys = orderShopOptionKeys(availableOrders);
			merchants.forEach(function (merchant) {
				if (selectedMerchant !== 'all' && String(merchant.id || '') !== String(selectedMerchant)) { return; }
				if (Array.isArray(merchant.shops)) { shops = shops.concat(merchant.shops); }
			});
			var seen = {};
			var html = '<option value="all">全部店铺</option>';
			shops.forEach(function (shop) {
				var value = shopValue(shop);
				var key = matchKey(value);
				if (!value || seen[key] || !shopMatchesOrderShopKeys(shop, shopOptionKeys)) { return; }
				seen[key] = true;
				html += '<option value="' + escapeHtml(value) + '">' + escapeHtml(shopLabel(shop)) + '</option>';
			});
			html = appendUnboundShopOptions(html, seen, selectedMerchant);
			$('#shopSelect').html(html).val(selectedShop);
			if ($('#shopSelect').val() !== selectedShop) { $('#shopSelect').val('all'); }
			syncShopSelectLock();
		}
		function loadMerchants() {
			return requestJson(API_BASE + '/getMerchants/index.php', {}).then(function (data) {
				merchants = data && data.success && Array.isArray(data.data) ? data.data : [];
				renderMerchantOptions();
			}).catch(function () {
				merchants = [];
				renderMerchantOptions();
				showToast('获取商家店铺失败');
			});
		}
		function selectedMerchant() {
			var selectedId = $('#merchantSelect').val();
			if (!selectedId || selectedId === 'all') { return null; }
			return merchants.find(function (merchant) { return String(merchant.id || '') === String(selectedId); }) || null;
		}
		function selectedMerchantShopValues() {
			var merchant = selectedMerchant();
			var values = {};
			if (!merchant || !Array.isArray(merchant.shops)) { return values; }
			merchant.shops.forEach(function (shop) {
				if (shop.shopCode) { addMatchValue(values, shop.shopCode); }
				if (shop.shopName) { addMatchValue(values, shop.shopName); }
			});
			if (merchant.id) { addMatchValue(values, merchant.id); }
			if (merchant.mid) { addMatchValue(values, merchant.mid); }
			if (merchant.merchantName) { addMatchValue(values, merchant.merchantName); }
			return values;
		}
		function merchantForOrder(order) {
			var merchantId = String(order && order.merchantId || '').trim();
			var merchantCode = String(order && order.merchantCode || '').trim();
			var merchantName = String(order && order.merchantName || '').trim();
			var customer = String(order && order.customer || '').trim();
			var shopName = String(order && order.shopName || '').trim();
			var keys = [merchantId, merchantCode, merchantName, customer, shopName].map(matchKey);
			return merchants.find(function (merchant) {
				if (keys.indexOf(matchKey(merchant.id)) > -1 || keys.indexOf(matchKey(merchant.mid)) > -1 || keys.indexOf(matchKey(merchant.merchantName)) > -1) {
					return true;
				}
				return Array.isArray(merchant.shops) && merchant.shops.some(function (shop) {
					return keys.indexOf(matchKey(shop.shopCode)) > -1 || keys.indexOf(matchKey(shop.shopName)) > -1;
				});
			}) || null;
		}
		function filterOrdersBySelectedMerchant(orders) {
			var merchant = selectedMerchant();
			var shop = $('#shopSelect').val();
			var shopText = shop && shop !== 'all' ? ($('#shopSelect option:selected').text() || '') : '';
			var shopName = shopText.indexOf('(未绑定)') > -1 ? shopText.replace(/\(未绑定\)$/, '') : shopText;
			shopName = shopName.indexOf(' - ') > -1 ? shopName.split(' - ').slice(1).join(' - ') : shopName;
			var values;
			if (!merchant && (!shop || shop === 'all')) { return orders; }
			values = selectedMerchantShopValues();
			return orders.filter(function (order) {
				var customer = String(order.customer || '').trim();
				var orderShopName = String(order.shopName || '').trim();
				var customerKey = matchKey(customer);
				var orderShopKey = matchKey(orderShopName);
				var selectedShopKey = matchKey(shop);
				var selectedShopNameKey = matchKey(shopName);
				if (merchant && !values[customerKey] && !values[orderShopKey]) { return false; }
				if (shop && shop !== 'all' && customerKey !== selectedShopKey && orderShopKey !== selectedShopKey && orderShopKey !== selectedShopNameKey) { return false; }
				return true;
			});
		}
		function isUnboundShopOrder(order) {
			var shopKey = matchKey(order && order.shopName);
			if (!shopKey) { return false; }
			return !merchants.some(function (merchant) {
				return Array.isArray(merchant.shops) && merchant.shops.some(function (shop) {
					return matchKey(shop.shopName) === shopKey || matchKey(shop.shopCode) === shopKey;
				});
			});
		}
		function datePart($node) {
			var month = String($node.attr('month') || '').padStart(2, '0');
			var day = String($node.attr('day') || '').padStart(2, '0');
			return $node.attr('year') + '-' + month + '-' + day;
		}
		function timePart($node) {
			return String($node.attr('hour') || '00').padStart(2, '0') + ':' +
				String($node.attr('minute') || '00').padStart(2, '0') + ':' +
				String($node.attr('second') || '00').padStart(2, '0');
		}
		function getStartTime() { return datePart($('#adddate .start-datetime .date')) + ' ' + timePart($('#adddate .start-datetime .time')); }
		function getEndTime() { return datePart($('#adddate .end-datetime .date')) + ' ' + timePart($('#adddate .end-datetime .time')); }
		function getBillDateRange() { return getStartTime() + ' 至 ' + getEndTime(); }
		function compactDate(value) { return String(value || '').slice(0, 10).replace(/-/g, ''); }
		function getCompactBillDateRange() { return compactDate(getStartTime()) + '~' + compactDate(getEndTime()); }
		function statusText(value) {
			var map = { '1': '待发货', '2': '已发货', '3': '已回收', 'WAIT_SEND': '待发货', 'SENT': '已发货', 'RECYCLED': '已回收' };
			return map[value] || value || '-';
		}
		function orderTypeText(value) {
			var map = {
				'1': '手工订单',
				'2': '平台订单',
				'manual': '手工订单',
				'shop': '平台订单',
				'手工单': '手工订单',
				'店铺单': '平台订单'
			};
			return map[value] || value || '-';
		}
		function orderTypeValue(value) {
			var map = {
				'1': '1',
				'2': '2',
				'manual': '1',
				'shop': '2',
				'手工单': '1',
				'店铺单': '2',
				'手工订单': '1',
				'平台订单': '2'
			};
			return map[value] || '2';
		}
		function getOrderBeans(orderId) { return beansByOrder[orderId] || []; }
		function getBeanQty(bean) {

			setOrderEditValue('receiverProvince', order.receiverProvince || '');
			setOrderEditValue('receiverAddress', order.receiverAddress || '');
			setOrderEditValue('waybillCom', order.waybillCom || '');
			setOrderEditValue('waybillNumber', order.waybillNumber || '');
			setOrderEditValue('waybillTemplate', order.waybillTemplate || '');
			setOrderEditValue('deliveryTime', order.deliveryTime || now);
			setOrderEditValue('printTime', order.printTime || '');
			setOrderEditValue('remark', order.remark || '');
			renderEditBeans(getOrderBeans(order.orderId));
			$('#orderEditModal').addClass('show');
			$('#editReceiverName').focus();
		}
		function orderEditPayload() {
			return {
				customer: ($('#editCustomer').val() || '').trim(),
				orderId: ($('#editOrderId').val() || '').trim(),
				platId: ($('#editPlatId').val() || '').trim(),
				orderType: $('#editOrderType').val() || '2',
				tradeStatus: $('#editTradeStatus').val() || '已发货',
				shopName: ($('#editShopName').val() || '').trim(),
				receiverName: ($('#editReceiverName').val() || '').trim(),
				receiverProvince: ($('#editReceiverProvince').val() || '').trim(),
				receiverAddress: ($('#editReceiverAddress').val() || '').trim(),
				receiverMobile: ($('#editReceiverMobile').val() || '').trim(),
				remark: ($('#editRemark').val() || '').trim(),
				waybillNumber: ($('#editWaybillNumber').val() || '').trim(),
				waybillCom: ($('#editWaybillCom').val() || '').trim(),
				waybillTemplate: ($('#editWaybillTemplate').val() || '').trim(),
				deliveryTime: normalizeDateTime($('#editDeliveryTime').val()) || formatDateTime(new Date()),
				printTime: normalizeDateTime($('#editPrintTime').val())
			};
		}
		function saveOrderBeans(order, beans) {
			return requestJson(API_BASE + '/updateBean/index.php', { parentOrderId: order.orderId, beans: beans }).then(function (data) {
				if (!data || !data.success) {
					throw new Error(data && data.txt ? data.txt : '保存发货内容失败');
				}
			});
		}
		function saveOrderEdit() {
			var payload = orderEditPayload();
			var beans;
			if (!payload.orderId) {
				showToast('请填写订单编号');
				return;
			}
			if (!payload.receiverName) {
				showToast('请填写收件人');
				return;
			}
			if (!payload.customer) {
				showToast('请选择已有商家');
				return;
			}
			beans = editBeansPayload(payload);
			$('#saveOrderEdit').prop('disabled', true).text('保存中...');
			requestJson(API_BASE + '/updateOrder/index.php', payload).then(function (data) {
				if (!data || !data.success) {
					throw new Error(data && data.txt ? data.txt : '保存订单失败');
				}
				return saveOrderBeans(payload, beans);
			}).then(function () {
				showToast('订单已保存');
				closeOrderEditModal();
				selectedOrderId = payload.orderId;
				return loadOrders();
			}).catch(function (error) {
				showToast(error.message || '保存订单失败');
			}).then(function () {
				$('#saveOrderEdit').prop('disabled', false).text('保存订单');
			});
		}
		function openSelectedOrderEdit() {
			var order = selectedOrder();
			if (!order) {
				showToast('请选择要编辑的订单');
				return;
			}
			openOrderEditModal(order);
		}
		function reloadOrderBeans(orderId, button) {
			var id = String(orderId || '').trim();
			var $button = $(button);
			if (!id) {
				showToast('缺少订单编号');
				return;
			}
			$button.prop('disabled', true).addClass('is-loading');
			requestJsonRetry(API_BASE + '/getBeans/index.php', { orderId: id }, 3).then(function (data) {
				beansByOrder[id] = data && data.success && Array.isArray(data.data) ? data.data : [];
				renderRows();
				showToast('发货内容已重新加载');
			}).catch(function (error) {
				showToast(error.message || '重新加载发货内容失败');
			}).then(function () {
				$button.prop('disabled', false).removeClass('is-loading');
			});
		}
		function runLimited(items, limit, worker) {
			var list = Array.isArray(items) ? items : [];
			var max = Math.max(1, parseInt(limit, 10) || 1);
			var index = 0;
			var active = 0;
			var stopped = false;
			var results = [];
			return new Promise(function (resolve, reject) {
				function next() {
					if (stopped) { return; }
					if (index >= list.length && active === 0) {
						resolve(results);
						return;
					}
					while (active < max && index < list.length) {
						(function (item, itemIndex) {
							index += 1;
							active += 1;
							Promise.resolve().then(function () {
								return worker(item, itemIndex);
							}).then(function (result) {
								results[itemIndex] = result;
							}).catch(function (error) {
								stopped = true;
								reject(error);
							}).then(function () {
								active -= 1;
								next();
							});
						})(list[index], index);
					}
				}
				next();
			});
		}
		function loadProductRules() {
			return requestJson(API_BASE + '/getProducts/index.php', {}).then(function (data) {
				productRules = data && data.success && Array.isArray(data.data) ? data.data : [];
			}).catch(function () { productRules = []; });
		}
		function loadAuditWeights() {
			return requestJson(API_BASE + '/getOrderWeightInfo/index.php', {}).then(function (data) {
				var auditItems = data && data.success && Array.isArray(data.auditItems) ? data.auditItems : [];
				auditWeightByWaybill = {};
				auditItems.forEach(function (item) {
					var waybill = String(item && item.waybillNumber || '').trim();
					if (waybill) {
						auditWeightByWaybill[waybill] = item;
					}
				});
			}).catch(function () { auditWeightByWaybill = {}; });
		}
		function loadTearOrders() {
			return requestJson(API_BASE + '/getTearOrders/index.php', {}).then(function (data) {
				tearOrderByWaybill = {};
				if (data && data.success && Array.isArray(data.data)) {
					data.data.forEach(function (item) {
						var key = normalizeWaybill(item && item.waybillNumber);
						if (key) { tearOrderByWaybill[key] = item; }
					});
				}
			}).catch(function () { tearOrderByWaybill = {}; });
		}
		function searchPayload(page, size) {
			var merchantId = $('#merchantSelect').val();
			var orderType = $('#orderTypeFilter').val();
			return {
				page: page || 1,
				pageSize: size || 500,
				startTime: getStartTime(),
				endTime: getEndTime(),
				merchantId: merchantId === 'all' ? '' : merchantId,
				merchant: $('#merchantSelect option:selected').attr('data-mid') || $('#merchantSelect').val(),
				shopName: orderType === '1' ? 'all' : $('#shopSelect').val(),
				status: $('#billStatus').val() === 'ready' ? 'ready' : 'all',
				orderType: orderType,
				keywordType: $('#keywordType').val(),
				keyword: ($('#keyword').val() || '').trim()
			};
		}
		function responseTotal(data) {
			var total = parseInt(data && data.total, 10);
			return isNaN(total) ? 0 : total;
		}
		function fetchAllOrders(page, collected, expectedTotal) {
			var size = 500;
			return requestJson(API_BASE + '/getOrders/index.php', searchPayload(page, size)).then(function (data) {
				var list;
				var total;
				if (!data || !data.success || !Array.isArray(data.data)) {
					throw new Error(data && data.txt ? data.txt : '获取订单失败');
				}
				list = data.data;
				total = expectedTotal == null ? responseTotal(data) : expectedTotal;
				collected = collected.concat(list);
				if (list.length && collected.length < total) {
					return fetchAllOrders(page + 1, collected, total);
				}
				return collected;
			});
		}
		function randomShareCode() {
			var chars = '0123456789abcdef';
			var code = '';
			var values;
			var i;
			if (window.crypto && window.crypto.getRandomValues) {
				values = new Uint32Array(16);
				window.crypto.getRandomValues(values);
				for (i = 0; i < values.length; i += 1) { code += chars[values[i] % chars.length]; }
				return code;
			}
			for (i = 0; i < 16; i += 1) { code += chars[Math.floor(Math.random() * chars.length)]; }
			return code;
		}
		function shareUrlFor(code) {
			var base = window.location.href.split('#')[0].split('?')[0];
			return base.replace(/bill-create\.html$/i, 'bill-share.html') + '?code=' + encodeURIComponent(code);
		}
		function selectedOrdersForBill() {
			return currentOrders.filter(quantityMatches);
		}
		function selectedMerchantInfo() {
			var merchant = selectedMerchant();
			return {
				id: $('#merchantSelect').val() === 'all' ? '' : $('#merchantSelect').val(),
				code: $('#merchantSelect option:selected').attr('data-mid') || '',
				name: merchant ? merchant.merchantName || '' : ''
			};
		}
		function selectedShopInfo() {
			var value = $('#shopSelect').val();
			var text = $('#shopSelect option:selected').text() || '';
			return {
				code: value === 'all' ? '' : value,
				name: value === 'all' ? '' : text
			};
		}
		function orderSnapshot(order) {
			var calc = calcOrder(order);
			var beans = getOrderBeans(order.orderId);
			return {
				orderId: order.orderId || '',
				platId: order.platId || '',
				orderType: order.orderType || '',
				tradeStatus: order.tradeStatus || '',
				statusText: statusText(order.tradeStatus),
				customer: order.customer || '',
				merchantId: order.merchantId || '',
				merchantCode: order.merchantCode || '',
				merchantName: order.merchantName || '',
				shopName: order.shopName || '',
				receiverName: order.receiverName || '',
				receiverMobile: order.receiverMobile || '',
				receiverProvince: order.receiverProvince || '',
				receiverAddress: order.receiverAddress || '',
				deliveryTime: order.deliveryTime || '',
				printTime: order.printTime || '',
				totalQty: calc.totalQty,
				amount: calc.total,
				hasRemote: calc.hasRemote,
				hasError: calc.hasError,
				hasTear: calc.hasTear,
				items: beans.map(function (bean) {
					var beanCalc = calcBean(bean, order);
					return {
						sku: bean.sku || '',
						quantity: beanCalc.qty,
						agentPrice: beanCalc.unitPrice,
						subtotal: beanCalc.subtotal,
						waybillCom: getBeanCompany(bean, order),
						waybillNumber: getBeanWaybill(bean, order),
						weightActual: bean.weightActual || '',
						tearActionType: beanCalc.tearRecord ? beanCalc.tearRecord.actionType || '' : '',
						tearActionTime: beanCalc.tearRecord ? beanCalc.tearRecord.actionTime || '' : ''
					};
				})
			};
		}
		function billPayload(shareCode, shareUrl) {
			var merchant = selectedMerchantInfo();
			var shop = selectedShopInfo();
			var orders = selectedOrdersForBill();
			return {
				shareCode: shareCode,
				shareUrl: shareUrl,
				merchantId: merchant.id,
				merchantCode: merchant.code,
				merchantName: merchant.name,
				shopCode: shop.code,
				shopName: shop.name,
				startTime: getStartTime(),
				endTime: getEndTime(),
				orderCount: summary.orderCount,
				unboundCount: summary.unboundCount,
				remoteCount: summary.remoteCount,
				errorCount: summary.errorCount,
				totalAmount: summary.total,
				billText: billInfoText(),
				orderData: orders.map(orderSnapshot)
			};
		}
		function saveBill() {
			var shareCode = randomShareCode();
			var shareUrl = shareUrlFor(shareCode);
			var payload = billPayload(shareCode, shareUrl);
			if (!payload.orderCount) {
				showToast('当前条件没有可生成的订单');
				return Promise.resolve(null);
			}
			return requestJson(API_BASE + '/addBill/index.php', payload).then(function (data) {
				if (!data || !data.success) {
					throw new Error(data && data.txt ? data.txt : '保存账单失败');
				}
				return { shareCode: data.shareCode || shareCode, shareUrl: data.shareUrl || shareUrl };
			});
		}
		function loadOrders() {
			var requestId = loadOrdersSeq += 1;
			if (!getToken()) { showToast('请先在登录页输入密钥'); }
			setLoading();
			$('#searchOrders, #refreshOrders').prop('disabled', true);
			return Promise.all([
				fetchAllOrders(1, [], null),
				loadProductRules(),
				loadAuditWeights(),
				loadTearOrders()
			]).then(function (results) {
				var nextBeans = {};
				if (requestId !== loadOrdersSeq) { return false; }
				availableOrders = results[0];
				renderShopOptions();
				currentOrders = filterOrdersBySelectedMerchant(availableOrders);
				return runLimited(currentOrders, ORDER_BEAN_CONCURRENCY, function (order) {
					return loadBeans(order.orderId, nextBeans);
				}).then(function () {
					if (requestId !== loadOrdersSeq) { return false; }
					beansByOrder = nextBeans;
					return true;
				});
			}).then(function (active) {
				if (!active) { return false; }
				renderRows();
				showToast('订单数据已更新');
				return true;
			}).catch(function (error) {
				if (requestId !== loadOrdersSeq) { return false; }
				currentOrders = [];
				availableOrders = [];
				beansByOrder = {};
				renderShopOptions();
				renderRows();
				showToast(error.message || '获取订单失败');
				return false;
			}).finally(function () {
				if (requestId === loadOrdersSeq) {
					$('#searchOrders, #refreshOrders').prop('disabled', false);
				}
			});
		}

		$('#searchOrders, #refreshOrders').on('click', loadOrders);
		$('#merchantSelect').on('change', function () {
			renderShopOptions();
			loadOrders();
		});
		$('#shopSelect').on('change', loadOrders);
		$('#billStatus').on('change', loadOrders);
		$('#orderTypeFilter').on('change', function () {
			syncShopSelectLock();
			loadOrders();
		});
		$('#quantityRangeFilter').on('change', function () {
			updateQuantityRangeInputs();
			renderRows();
		});
		$('#quantityMinFilter, #quantityMaxFilter').on('input change', renderRows);
		$('#keyword').on('keydown', function (event) { if (event.key === 'Enter') { loadOrders(); } });
		$(document).on('click', '.dateTimeSelector-wraper .confirm-datetime', function () {
			if ($('.dateTimeSelector-wraper').attr('target') === '#adddate') {
				loadOrders();
			}
		});
		$('#generateBill').on('click', function () {
			loadOrders().then(function (active) {
				if (!active) { return null; }
				renderRows();
				return saveBill();
			}).then(function (bill) {
				if (!bill) { return; }
				return copyText(bill.shareUrl).then(function () {
					showToast('账单已保存，分享链接已复制');
				}).catch(function () {
					showToast('账单已保存：' + bill.shareUrl);
				});
			}).catch(function (error) {
				showToast(error.message || '保存账单失败');
			});
		});
		$('.unbound-jump').on('click', jumpToNextUnbound);
		$('.remote-jump').on('click', jumpToNextRemote);
		$('.error-jump').on('click', jumpToNextError);
		$('#editOrderButton').on('click', openSelectedOrderEdit);
		$('#closeOrderEdit, #cancelOrderEdit').on('click', closeOrderEditModal);
		$('#orderEditModal').on('click', function (event) {
			if (event.target === this) { closeOrderEditModal(); }
		});
		$('#orderEditForm').on('submit', function (event) {
			event.preventDefault();
			saveOrderEdit();
		});
		$('#addEditBean').on('click', function () {
			$('#editBeansList').append(editBeanRow({}));
		});
		$('#editBeansList').on('click', '.remove-edit-bean', function () {
			$(this).closest('.bean-editor-row').remove();
			if (!$('#editBeansList .bean-editor-row').length) {
				$('#editBeansList').html(editBeanRow({}));
			}
		});
		$('#orderRows').on('click', 'tr[data-order-id]', function (event) {
			if ($(event.target).closest('button, a, input, select, textarea, label').length) {
				return;
			}
			selectedOrderId = String($(this).attr('data-order-id') || '');
			$('#orderRows tr[data-order-id]').removeClass('is-selected');
			$(this).addClass('is-selected');
		});
		$('#orderRows').on('click', '.reload-order-beans', function () {
			reloadOrderBeans($(this).attr('data-order-id'), this);
		});
		$('#orderRows').on('click', '.copy-btn', function () {
			var value = $(this).closest('.meta-line, .goods-subline').find('.copy-value').first().text().trim();
			if (!value || value === '-') {
				showToast('没有可复制的内容');
				return;
			}
			copyText(value).then(function () {
				showToast('已复制：' + value);
			}).catch(function () {
				showToast('复制失败，请手动复制');
			});
		});
		$('#merchantSelect, #shopSelect, #billStatus, #orderTypeFilter').val('all');
		syncShopSelectLock();
		updateQuantityRangeInputs();
		loadMerchants().then(loadOrders);
	});
</script>

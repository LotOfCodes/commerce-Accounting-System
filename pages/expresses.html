ght:18px;word-break:break-all}.fee-table{width:100%;min-width:640px;border-collapse:collapse;border:1px solid var(--line);border-radius:6px;overflow:hidden}.fee-table th,.fee-table td{border:1px solid var(--line-soft);padding:8px 10px;text-align:center;vertical-align:middle;font-size:12px}.fee-table th{background:#f8fafc;color:#4b5563}.fee-table .region{width:72px;font-weight:700;color:var(--blue)}.fee-table .province{text-align:left;color:var(--text)}.fee-summary{margin-top:8px;color:var(--muted);font-size:12px}.empty-row td,.loading-row td{padding:28px 12px;text-align:center;color:var(--muted)}.pagination{justify-content:flex-end;padding:12px;color:var(--muted);font-size:13px}.page-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:var(--blue);color:#fff;font-weight:700}.bottom-tools{position:fixed;left:0;right:0;bottom:0;justify-content:center;padding:12px 14px;background:rgba(31,41,55,.86);backdrop-filter:blur(8px)}.bottom-tools .btn{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff}.bottom-tools .btn:hover{border-color:#fff;color:#fff}.modal-backdrop{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(15,23,42,.48)}.modal-backdrop.show{display:flex}.express-dialog{width:min(1100px,100%);max-height:calc(100vh - 36px);overflow:auto;border-radius:8px;background:#fff;box-shadow:0 18px 50px rgba(15,23,42,.26)}.dialog-head,.dialog-actions{justify-content:space-between;padding:14px;border-bottom:1px solid var(--line-soft)}.dialog-actions{justify-content:flex-end;border-top:1px solid var(--line-soft);border-bottom:0}.dialog-title{margin:0;font-size:18px;line-height:26px}.express-form{padding:14px}.form-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px}.form-grid .wide{grid-column:span 4}.form-grid .half{grid-column:span 2}.fee-editor{width:100%;border-collapse:collapse}.fee-editor th,.fee-editor td{border-bottom:1px solid var(--line-soft);padding:8px;vertical-align:middle;text-align:left;font-size:12px}.fee-editor th{background:#f8fafc;color:#4b5563}.fee-editor input{width:100%;height:32px;padding:0 8px;border:1px solid var(--line);border-radius:5px}.fee-editor .fee-number{min-width:76px}.fee-actions{justify-content:space-between;margin-top:10px}.fee-mode-actions{flex-wrap:wrap}.toast{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);z-index:30;display:none;padding:9px 14px;border-radius:6px;background:rgba(17,24,39,.92);color:#fff;font-size:13px}.toast.show{display:block}@media(max-width:1100px){.filter-grid{grid-template-columns:repeat(3,minmax(140px,1fr))}.form-grid{grid-template-columns:repeat(2,minmax(150px,1fr))}.form-grid .wide,.form-grid .half{grid-column:span 2}}@media(max-width:720px){.express-page{padding:10px 10px 88px}.summary-row{align-items:flex-start;flex-direction:column}.filter-grid,.form-grid{grid-template-columns:1fr}.form-grid .wide,.form-grid .half{grid-column:auto}.filter-actions,.bottom-tools,.pagination{flex-wrap:wrap}.filter-actions .btn,.bottom-tools .btn{flex:1 1 120px}.fee-actions{align-items:flex-start;flex-direction:column}.express-dialog{max-height:calc(100vh - 20px)}}

<div class="express-page"><section class="toolbar"><div class="summary-row"><h1 class="page-title">快递资费</h1><div class="express-count">快递总数：<span id="expressCount">0</span></div></div><div class="filter-grid"><div class="field"><label for="companyFilter">快递公司</label><select id="companyFilter"><option value="">全部快递</option></select></div><div class="field"><label for="settleFilter">结算对象</label><select id="settleFilter"><option value="">全部对象</option><option value="商家">商家</option><option value="厂家">厂家</option><option value="平台">平台</option></select></div><div class="field"><label for="statusFilter">状态</label><select id="statusFilter"><option value="">全部状态</option><option value="有效">有效</option><option value="停用">停用</option></select></div><div class="field"><label for="provinceFilter">省份</label><input id="provinceFilter" type="text" placeholder="输入省份或分区"></div><div class="field"><label for="regexFilter">正则匹配</label><input id="regexFilter" type="text" placeholder="输入快递名称或正则"></div><div class="filter-actions"><button class="btn primary" type="button" id="searchButton"><svg class="icon"><use href="#i-search"></use></svg>搜索</button><button class="btn" type="button" id="resetButton"><svg class="icon"><use href="#i-refresh"></use></svg>重置</button></div></div></section>
<section class="table-panel"><div class="table-scroll"><table class="express-table"><thead><tr><th class="check-cell"><input type="checkbox" id="checkAll" aria-label="全选"></th><th>快递信息</th><th>正则匹配</th><th>资费详情</th><th>结算对象</th><th>操作</th></tr></thead><tbody id="expressList"><tr class="loading-row"><td colspan="6">正在获取快递资费...</td></tr></tbody></table></div><div class="pagination"><span id="paginationTotal">共 0 条</span><select class="btn" id="pageSizeSelect" aria-label="每页条数"><option value="10">10 条/页</option><option value="20" selected>20 条/页</option><option value="50">50 条/页</option></select><button class="btn" type="button" id="prevPage">上一页</button><span class="page-num" id="currentPage">1</span><button class="btn" type="button" id="nextPage">下一页</button></div></section></div>
<div class="bottom-tools"><button class="btn" type="button" id="addExpressButton"><svg class="icon"><use href="#i-plus"></use></svg>添加快递</button><button class="btn" type="button" id="batchDeleteButton"><svg class="icon"><use href="#i-trash"></use></svg>批量删除</button></div>
<div class="modal-backdrop" id="expressModal"><div class="express-dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle"><div class="dialog-head"><h2 class="dialog-title" id="dialogTitle">添加快递</h2><button class="btn" type="button" id="closeModalButton"><svg class="icon"><use href="#i-x"></use></svg>关闭</button></div><form class="express-form" id="expressForm"><input type="hidden" id="expressId"><div class="form-grid"><div class="field"><label for="expressName">快递名称</label><input id="expressName" type="text" autocomplete="off"></div><div class="field"><label for="templateCode">模板编号</label><input id="templateCode" type="text" autocomplete="off"></div><div class="field"><label for="expressStatus">状态</label><select id="expressStatus"><option value="有效">有效</option><option value="停用">停用</option></select></div><div class="field"><label for="settleTarget">结算对象</label><select id="settleTarget"><option value="商家">商家</option><option value="厂家">厂家</option><option value="平台">平台</option></select></div><div class="field"><label for="freightPayer">运费承担</label><select id="freightPayer"><option value="商家承担">商家承担</option><option value="厂家承担">厂家承担</option><option value="平台承担">平台承担</option><option value="买家承担">买家承担</option></select></div><div class="field"><label for="remoteNote">偏远费说明</label><input id="remoteNote" type="text" autocomplete="off"></div><div class="field half"><label for="expressRemark">备注</label><input id="expressRemark" type="text" autocomplete="off"></div><div class="field wide"><label for="regexRules">正则匹配</label><textarea id="regexRules" placeholder="一行一个正则，例如：圆通|YT|YTO"></textarea></div><div class="field wide" id="feeRulesField"><label>资费规则</label><div class="fee-mode-actions"><button class="btn" type="button" id="useRegionFees"><svg class="icon"><use href="#i-grid"></use></svg>按分区资费</button><button class="btn" type="button" id="useProvinceFees"><svg class="icon"><use href="#i-list"></use></svg>一省一行资费</button></div><div class="table-scroll"><table class="fee-editor"><thead><tr><th>分区</th><th>省份</th><th class="fee-number">≤1kg</th><th class="fee-number">≤2kg</th><th class="fee-number">≤3kg</th><th class="fee-number">≤4kg</th><th class="fee-number">续重/kg</th><th>操作</th></tr></thead><tbody id="feeEditorBody"></tbody></table></div><div class="fee-actions"><span class="meta-value">按分区时一行可包含多个省份；按省份时每个省单独一行，可逐省调整资费。</span><button class="btn" type="button" id="addFeeRowButton"><svg class="icon"><use href="#i-plus"></use></svg>添加资费行</button></div></div></div><div class="dialog-actions"><button class="btn primary" type="submit" id="saveExpressButton"><svg class="icon"><use href="#i-save"></use></svg>保存</button></div></form></div></div>

<script>
(function(){
	'use strict';
	var API_BASE='../api';
	var allProvinces=['北京','天津','河北','山西','内蒙古','上海','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','广西','海南','重庆','四川','贵州','云南','西藏','陕西','甘肃','青海','宁夏','新疆','辽宁','吉林','黑龙江','香港','澳门','台湾'];
	var defaultFees=[
		{region:'华北',provinces:'北京、天津、河北、山西、内蒙古',kg1:'5.00',kg2:'7.00',kg3:'9.00',kg4:'11.00',renew:'2.00'},
		{region:'华东',provinces:'上海、江苏、浙江、安徽、福建、江西、山东',kg1:'4.00',kg2:'6.00',kg3:'8.00',kg4:'10.00',renew:'2.00'},
		{region:'华中',provinces:'河南、湖北、湖南',kg1:'4.00',kg2:'6.00',kg3:'9.00',kg4:'12.00',renew:'2.00'},
		{region:'华南',provinces:'广东、广西、海南',kg1:'3.00',kg2:'5.00',kg3:'8.00',kg4:'11.00',renew:'2.00'},
		{region:'西南',provinces:'重庆、四川、贵州、云南、西藏',kg1:'6.00',kg2:'8.00',kg3:'11.00',kg4:'14.00',renew:'3.00'},
		{region:'西北',provinces:'陕西、甘肃、青海、宁夏、新疆',kg1:'7.00',kg2:'9.00',kg3:'12.00',kg4:'15.00',renew:'3.00'},
		{region:'东北',provinces:'辽宁、吉林、黑龙江',kg1:'7.00',kg2:'9.00',kg3:'11.00',kg4:'13.00',renew:'3.00'},
		{region:'港澳台',provinces:'香港、澳门、台湾',kg1:'18.00',kg2:'28.00',kg3:'38.00',kg4:'48.00',renew:'10.00'}
	];
	var regionMap={'北京':'华北','天津':'华北','河北':'华北','山西':'华北','内蒙古':'华北','上海':'华东','江苏':'华东','浙江':'华东','安徽':'华东','福建':'华东','江西':'华东','山东':'华东','河南':'华中','湖北':'华中','湖南':'华中','广东':'华南','广西':'华南','海南':'华南','重庆':'西南','四川':'西南','贵州':'西南','云南':'西南','西藏':'西南','陕西':'西北','甘肃':'西北','青海':'西北','宁夏':'西北','新疆':'西北','辽宁':'东北','吉林':'东北','黑龙江':'东北','香港':'港澳台','澳门':'港澳台','台湾':'港澳台'};
	var fallbackExpresses=[{id:'demo-yto',expressName:'圆通快递',templateCode:'YT-DEFAULT-2026',regexRules:'圆通|YT|YTO\n圆通速递',feeRules:defaultFees,settleTarget:'商家',freightPayer:'商家承担',status:'有效',remoteNote:'偏远费单独核算',remark:'默认模板',updatedTime:'2026-07-03 09:00:00'}];
	var expresses=[],filteredExpresses=[],currentPage=1,pageSize=20,toast=document.getElementById('toast'),modal=document.getElementById('expressModal');
	function icon(id){return '<svg class="icon" aria-hidden="true"><use href="#'+id+'"></use></svg>'}
	function showToast(text){toast.textContent=text;toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(function(){toast.classList.remove('show')},1600)}
	function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
	function getToken(){try{return (JSON.parse(localStorage.getItem('orders-token')||'{}').token||'').trim()}catch(e){return ''}}
	function requestJson(endpoint,payload){return fetch(API_BASE+endpoint,{method:'POST',headers:{'Content-Type':'application/json;charset=UTF-8','token':getToken()},body:JSON.stringify(payload||{}),redirect:'follow'}).then(function(res){return res.json()})}
	function valueOf(item,key,alt){return item&&item[key]!=null&&item[key]!==''?item[key]:(alt||'')}
	function parseFees(value){if(Array.isArray(value))return value;if(!value)return [];try{var parsed=JSON.parse(value);return Array.isArray(parsed)?parsed:[]}catch(e){return []}}
	function rulesArray(value){return String(value||'').split(/\r?\n/).map(function(item){return item.trim()}).filter(Boolean)}
	function provinceList(fees){return fees.map(function(row){return row.provinces||row.province||''}).join('、')}
	function normalizeExpress(item){var fees=parseFees(item.feeRules||item.fee_rules);return {id:item.id,expressName:valueOf(item,'expressName',item.express_name),templateCode:valueOf(item,'templateCode',item.template_code),regexRules:valueOf(item,'regexRules',item.regex_rules),feeRules:fees.length?fees:defaultFees.slice(),settleTarget:valueOf(item,'settleTarget',item.settle_target||'商家'),freightPayer:valueOf(item,'freightPayer',item.freight_payer||'商家承担'),status:valueOf(item,'status','有效'),remoteNote:valueOf(item,'remoteNote',item.remote_note),remark:valueOf(item,'remark',''),updatedTime:valueOf(item,'updatedTime',item.updated_time)}}
	function fillCompanyFilter(){
		var select=document.getElementById('companyFilter'),current=select.value,names=[];
		expresses.forEach(function(item){if(item.expressName&&names.indexOf(item.expressName)===-1)names.push(item.expressName)});
		select.innerHTML='<option value="">全部快递</option>'+names.map(function(name){return '<option value="'+esc(name)+'">'+esc(name)+'</option>'}).join('');
		select.value=current;
	}
	function hasAllProvinces(fees){var text=provinceList(fees);return allProvinces.every(function(name){return text.indexOf(name)>-1})}
	function matches(item){
		var company=document.getElementById('companyFilter').value;
		var settle=document.getElementById('settleFilter').value;
		var status=document.getElementById('statusFilter').value;
		var province=document.getElementById('provinceFilter').value.trim();
		var regex=document.getElementById('regexFilter').value.trim().toLowerCase();
		var fees=item.feeRules||[];
		var text=[item.expressName,item.templateCode,item.regexRules,item.remoteNote,item.remark,provinceList(fees)].join(' ').toLowerCase();
		if(company&&item.expressName!==company)return false;
		if(settle&&item.settleTarget!==settle)return false;
		if(status&&item.status!==status)return false;
		if(province&&provinceList(fees).indexOf(province)===-1&&fees.map(function(f){return f.region||''}).join('、').indexOf(province)===-1)return false;
		if(regex&&text.indexOf(regex)===-1)return false;
		return true;
	}
	function feeTable(fees){
		var rows=fees.map(function(row){return '<tr><td class="region">'+esc(row.region||'-')+'</td><td class="province">'+esc(row.provinces||row.province||'-')+'</td><td>'+esc(row.kg1||'-')+'</td><td>'+esc(row.kg2||'-')+'</td><td>'+esc(row.kg3||'-')+'</td><td>'+esc(row.kg4||'-')+'</td><td>'+esc(row.renew||row.continuePrice||'-')+'</td></tr>'}).join('');
		return '<table class="fee-table"><thead><tr><th>分区</th><th>省份</th><th>≤1kg</th><th>≤2kg</th><th>≤3kg</th><th>≤4kg</th><th>续重/kg</th></tr></thead><tbody>'+rows+'</tbody></table><div class="fee-summary">'+(hasAllProvinces(fees)?'已覆盖全部省级地区':'省份覆盖未完整')+'</div>';
	}
	function renderRules(value){var list=rulesArray(value);return list.length?'<div class="tag-list">'+list.map(function(rule){return '<span class="rule-code">'+esc(rule)+'</span>'}).join('')+'</div>':'<span class="tag muted">未设置</span>'}
	function feeForProvince(province,sourceRows){
		sourceRows=sourceRows&&sourceRows.length?sourceRows:defaultFees;
		for(var i=0;i<sourceRows.length;i++){
			var names=String(sourceRows[i].provinces||sourceRows[i].province||'').split(/[、,，\s]+/);
			if(names.indexOf(province)>-1)return sourceRows[i];
		}
		return defaultFees.filter(function(row){return row.region===regionMap[province]})[0]||defaultFees[0];
	}
	function provinceFeeRows(sourceRows){
		return allProvinces.map(function(province){
			var source=feeForProvince(province,sourceRows);
			return {region:regionMap[province]||'',provinces:province,kg1:source.kg1||'',kg2:source.kg2||'',kg3:source.kg3||'',kg4:source.kg4||'',renew:source.renew||source.continuePrice||''};
		});
	}
	function render(){
		var list=document.getElementById('expressList'),start=(currentPage-1)*pageSize,pageItems=filteredExpresses.slice(start,start+pageSize);
		if(!pageItems.length){list.innerHTML='<tr class="empty-row"><td colspan="6">暂无快递资费</td></tr>'}else{list.innerHTML=pageItems.map(function(item){return ['<tr data-express-id="'+esc(item.id||'')+'">','<td class="check-cell"><input class="row-check" type="checkbox" value="'+esc(item.id||'')+'" aria-label="选择 '+esc(item.expressName||'快递')+'"></td>','<td><div class="meta-stack"><div class="meta-line"><span class="meta-label">快递名称：</span><span class="meta-value">'+esc(item.expressName||'-')+'</span></div><div class="meta-line"><span class="meta-label">模板编号：</span><span class="meta-value">'+esc(item.templateCode||'-')+'</span></div><div class="meta-line"><span class="meta-label">状态：</span><span class="tag '+(item.status==='有效'?'green':'muted')+'">'+esc(item.status||'-')+'</span></div><div class="meta-line"><span class="meta-label">更新时间：</span><span class="meta-value">'+esc(item.updatedTime||'-')+'</span></div></div></td>','<td>'+renderRules(item.regexRules)+'</td>','<td>'+feeTable(item.feeRules||[])+'</td>','<td><div class="meta-stack"><div class="meta-line"><span class="meta-label">结算对象：</span><span class="meta-value">'+esc(item.settleTarget||'-')+'</span></div><div class="meta-line"><span class="meta-label">运费承担：</span><span class="meta-value">'+esc(item.freightPayer||'-')+'</span></div><div class="meta-line"><span class="meta-label">偏远费：</span><span class="meta-value">'+esc(item.remoteNote||'-')+'</span></div></div></td>','<td><div class="action-group"><button class="link-btn edit-fee" type="button" title="编辑资费" aria-label="编辑资费" data-id="'+esc(item.id||'')+'">'+icon('i-sliders')+'编辑资费</button><button class="link-btn edit-express" type="button" title="修改快递" aria-label="修改快递" data-id="'+esc(item.id||'')+'">'+icon('i-edit')+'修改</button><button class="link-btn danger delete-express" type="button" title="删除" aria-label="删除" data-id="'+esc(item.id||'')+'">'+icon('i-trash')+'删除</button></div></td>','</tr>'].join('')}).join('')}
		document.getElementById('expressCount').textContent=filteredExpresses.length;
		document.getElementById('paginationTotal').textContent='共 '+filteredExpresses.length+' 条';
		document.getElementById('currentPage').textContent=currentPage;
		document.getElementById('checkAll').checked=false;
	}
	function applyFilters(){filteredExpresses=expresses.filter(matches);var max=Math.max(1,Math.ceil(filteredExpresses.length/pageSize));if(currentPage>max)currentPage=max;render()}
	function loadExpresses(){
		if(!getToken())showToast('请先在登录页输入密钥');
		document.getElementById('expressList').innerHTML='<tr class="loading-row"><td colspan="6">正在获取快递资费...</td></tr>';
		return requestJson('/getExpresses/index.php',{}).then(function(data){if(!data||!data.success||!Array.isArray(data.data))throw new Error(data&&data.txt?data.txt:'获取快递资费失败');expresses=data.data.map(normalizeExpress);fillCompanyFilter();applyFilters()}).catch(function(e){expresses=fallbackExpresses.map(normalizeExpress);fillCompanyFilter();applyFilters();showToast((e&&e.message?e.message:'获取失败')+'，已显示默认模板')});
	}
	function findExpress(id){return expresses.filter(function(item){return String(item.id)===String(id)})[0]||null}
	function feeRow(row){row=row||{};return '<tr><td><input class="fee-region" value="'+esc(row.region||'')+'"></td><td><input class="fee-provinces" value="'+esc(row.provinces||row.province||'')+'"></td><td><input class="fee-kg1" value="'+esc(row.kg1||'')+'"></td><td><input class="fee-kg2" value="'+esc(row.kg2||'')+'"></td><td><input class="fee-kg3" value="'+esc(row.kg3||'')+'"></td><td><input class="fee-kg4" value="'+esc(row.kg4||'')+'"></td><td><input class="fee-renew" value="'+esc(row.renew||row.continuePrice||'')+'"></td><td><button class="link-btn danger remove-fee-row" type="button">'+icon('i-trash')+'删除</button></td></tr>'}
	function setFeeRows(rows){document.getElementById('feeEditorBody').innerHTML=(rows&&rows.length?rows:defaultFees).map(feeRow).join('')}
	function openModal(item,focusFee){
		document.getElementById('dialogTitle').textContent=item?'修改快递':'添加快递';
		document.getElementById('expressId').value=item?item.id||'':'';
		document.getElementById('expressName').value=item?item.expressName||'':'';
		document.getElementById('templateCode').value=item?item.templateCode||'':'';
		document.getElementById('expressStatus').value=item?item.status||'有效':'有效';
		document.getElementById('settleTarget').value=item?item.settleTarget||'商家':'商家';
		document.getElementById('freightPayer').value=item?item.freightPayer||'商家承担':'商家承担';
		document.getElementById('remoteNote').value=item?item.remoteNote||'':'';
		document.getElementById('expressRemark').value=item?item.remark||'':'';
		document.getElementById('regexRules').value=item?item.regexRules||'':'';
		setFeeRows(item?item.feeRules:defaultFees);
		modal.classList.add('show');
		(focusFee?document.getElementById('feeRulesField'):document.getElementById('expressName')).scrollIntoView({block:'nearest'});
		(focusFee?document.querySelector('#feeEditorBody input'):document.getElementById('expressName')).focus();
	}
	function closeModal(){modal.classList.remove('show')}
	function collectFees(){return Array.prototype.map.call(document.querySelectorAll('#feeEditorBody tr'),function(row){return {region:row.querySelector('.fee-region').value.trim(),provinces:row.querySelector('.fee-provinces').value.trim(),kg1:row.querySelector('.fee-kg1').value.trim(),kg2:row.querySelector('.fee-kg2').value.trim(),kg3:row.querySelector('.fee-kg3').value.trim(),kg4:row.querySelector('.fee-kg4').value.trim(),renew:row.querySelector('.fee-renew').value.trim()}}).filter(function(row){return row.region||row.provinces})}
	function useRegionTemplate(){setFeeRows(defaultFees);showToast('已切换为按分区资费')}
	function useProvinceTemplate(){setFeeRows(provinceFeeRows(collectFees()));showToast('已切换为一省一行资费')}
	function formData(){
		var name=document.getElementById('expressName').value.trim(),fees=collectFees();
		if(!name){showToast('请输入快递名称');document.getElementById('expressName').focus();return null}
		if(!fees.length){showToast('请至少添加一条资费规则');return null}
		return {id:document.getElementById('expressId').value,expressName:name,templateCode:document.getElementById('templateCode').value.trim(),regexRules:document.getElementById('regexRules').value.trim(),feeRules:JSON.stringify(fees),settleTarget:document.getElementById('settleTarget').value,freightPayer:document.getElementById('freightPayer').value,status:document.getElementById('expressStatus').value,remoteNote:document.getElementById('remoteNote').value.trim(),remark:document.getElementById('expressRemark').value.trim()}
	}
	function saveExpress(e){
		e.preventDefault();
		var payload=formData();if(!payload)return;
		var endpoint=payload.id?'/updateExpress/index.php':'/addExpress/index.php';if(!payload.id)delete payload.id;
		document.getElementById('saveExpressButton').disabled=true;
		requestJson(endpoint,payload).then(function(data){if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'保存快递资费失败');showToast('快递资费已保存');closeModal();return loadExpresses()}).catch(function(err){showToast(err.message||'保存快递资费失败')}).finally(function(){document.getElementById('saveExpressButton').disabled=false});
	}
	function deleteExpress(id){
		var item=findExpress(id),name=item?item.expressName:id;if(!id){showToast('缺少快递 ID');return Promise.resolve()}if(String(id).indexOf('demo-')===0){showToast('默认模板请先保存后再删除');return Promise.resolve()}if(!confirm('确定删除快递「'+name+'」？'))return Promise.resolve();
		return requestJson('/delExpress/index.php',{id:id}).then(function(data){if(!data||!data.success)throw new Error(data&&data.txt?data.txt:'删除快递失败');showToast('快递已删除');return loadExpresses()}).catch(function(e){showToast(e.message||'删除快递失败')});
	}
	function selectedIds(){return Array.prototype.map.call(document.querySelectorAll('.row-check:checked'),function(c){return c.value}).filter(function(id){return String(id).indexOf('demo-')!==0})}
	function batchDelete(){var ids=selectedIds();if(!ids.length){showToast('请选择要删除的快递');return}if(!confirm('确定删除选中的 '+ids.length+' 个快递？'))return;Promise.all(ids.map(function(id){return requestJson('/delExpress/index.php',{id:id})})).then(function(results){var failed=results.filter(function(item){return !item||!item.success});if(failed.length)throw new Error('部分快递删除失败');showToast('已删除 '+ids.length+' 个快递');return loadExpresses()}).catch(function(e){showToast(e.message||'批量删除失败')})}
	document.getElementById('searchButton').addEventListener('click',function(){currentPage=1;applyFilters()});
	document.getElementById('resetButton').addEventListener('click',function(){document.getElementById('companyFilter').value='';document.getElementById('settleFilter').value='';document.getElementById('statusFilter').value='';document.getElementById('provinceFilter').value='';document.getElementById('regexFilter').value='';currentPage=1;applyFilters()});
	['companyFilter','settleFilter','statusFilter'].forEach(function(id){document.getElementById(id).addEventListener('change',function(){currentPage=1;applyFilters()})});
	['provinceFilter','regexFilter'].forEach(function(id){document.getElementById(id).addEventListener('keydown',function(e){if(e.key==='Enter'){currentPage=1;applyFilters()}})});
	document.getElementById('pageSizeSelect').addEventListener('change',function(){pageSize=parseInt(this.value,10)||20;currentPage=1;render()});
	document.getElementById('prevPage').addEventListener('click',function(){if(currentPage>1){currentPage--;render()}});
	document.getElementById('nextPage').addEventListener('click',function(){if(currentPage*pageSize<filteredExpresses.length){currentPage++;render()}});
	document.getElementById('checkAll').addEventListener('change',function(){var checked=this.checked;Array.prototype.forEach.call(document.querySelectorAll('.row-check'),function(c){c.checked=checked;c.closest('tr').classList.toggle('is-selected',checked)})});
	document.getElementById('expressList').addEventListener('change',function(e){if(e.target.classList.contains('row-check'))e.target.closest('tr').classList.toggle('is-selected',e.target.checked)});
	document.getElementById('expressList').addEventListener('click',function(e){var edit=e.target.closest('.edit-express'),fee=e.target.closest('.edit-fee'),del=e.target.closest('.delete-express');if(edit)openModal(findExpress(edit.getAttribute('data-id')),false);if(fee)openModal(findExpress(fee.getAttribute('data-id')),true);if(del)deleteExpress(del.getAttribute('data-id'))});
	document.getElementById('addExpressButton').addEventListener('click',function(){openModal(null,false)});
	document.getElementById('batchDeleteButton').addEventListener('click',batchDelete);
	document.getElementById('closeModalButton').addEventListener('click',closeModal);
	document.getElementById('expressForm').addEventListener('submit',saveExpress);
	document.getElementById('useRegionFees').addEventListener('click',useRegionTemplate);
	document.getElementById('useProvinceFees').addEventListener('click',useProvinceTemplate);
	document.getElementById('addFeeRowButton').addEventListener('click',function(){document.getElementById('feeEditorBody').insertAdjacentHTML('beforeend',feeRow({region:'',provinces:'',kg1:'',kg2:'',kg3:'',kg4:'',renew:''}))});
	document.getElementById('feeEditorBody').addEventListener('click',function(e){var btn=e.target.closest('.remove-fee-row');if(btn)btn.closest('tr').remove()});
	loadExpresses();
})();
</script>
</body>
</html>

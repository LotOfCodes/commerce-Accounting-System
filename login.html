<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>&#30331;&#24405; - &#35760;&#36134;&#31995;&#32479;</title>
<style>
	html, body {
		width: 100%;
		height: 100%;
		margin: 0;
		font-family: Arial, "Microsoft YaHei", sans-serif;
		background: #f4f6fb;
		color: #20242a;
	}
	.login-page {
		min-height: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
		padding: 24px;
		box-sizing: border-box;
	}
	.login-box {
		width: 360px;
		max-width: 100%;
		padding: 32px;
		background: #fff;
		border: 1px solid #e4e8f0;
		border-radius: 8px;
		box-shadow: 0 18px 45px rgba(32, 36, 42, 0.08);
		box-sizing: border-box;
	}
	.login-title {
		margin: 0 0 24px;
		font-size: 24px;
		line-height: 32px;
		text-align: center;
	}
	.form-label {
		display: block;
		margin-bottom: 8px;
		font-size: 14px;
		color: #525967;
	}
	.key-input {
		width: 100%;
		height: 42px;
		padding: 0 12px;
		border: 1px solid #ccd4e0;
		border-radius: 6px;
		box-sizing: border-box;
		font-size: 15px;
		outline: none;
		transition: border-color .2s, box-shadow .2s;
	}
	.key-input:focus {
		border-color: #3e7cff;
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.15);
	}
	.error-text {
		min-height: 20px;
		margin: 10px 0 14px;
		font-size: 13px;
		line-height: 20px;
		color: #d93025;
	}
	.login-button {
		width: 100%;
		height: 42px;
		border: 0;
		border-radius: 6px;
		background: #3e7cff;
		color: #fff;
		font-size: 15px;
		font-weight: bold;
		cursor: pointer;
	}
	.login-button:hover {
		background: #2f6dec;
	}
	.login-button:active {
		background: #255fd7;
	}
</style>
</head>
<body>
	<div class="login-page">
		<form class="login-box" id="loginForm" autocomplete="off">
			<h1 class="login-title">&#35760;&#36134;&#31995;&#32479;</h1>
			<label class="form-label" for="tokenInput">&#23494;&#38053;</label>
			<input class="key-input" id="tokenInput" name="token" type="password" placeholder="&#35831;&#36755;&#20837;&#23494;&#38053;" autofocus>
			<div class="error-text" id="errorText"></div>
			<button class="login-button" type="submit">&#30331;&#24405;</button>
		</form>
	</div>
	<script>
		(function () {
			var form = document.getElementById('loginForm');
			var tokenInput = document.getElementById('tokenInput');
			var errorText = document.getElementById('errorText');

			form.addEventListener('submit', function (event) {
				event.preventDefault();
				var token = tokenInput.value.trim();

				if (!token) {
					errorText.textContent = '\u8bf7\u8f93\u5165\u5bc6\u94a5';
					tokenInput.focus();
					return;
				}

				localStorage.setItem('orders-token', JSON.stringify({ token: token }));
				window.location.href = 'index.html';
			});
		})();
	</script>
</body>
</html>

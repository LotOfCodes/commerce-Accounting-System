<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 - 记账系统</title>
<style>
	html, body {
		width: 100%;
		height: 100%;
		margin: 0;
		font-family: Arial, "Microsoft YaHei", sans-serif;
		background: #f4f6fb;
		color: #20242a;
	}
	.login-page {
		min-height: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
		padding: 24px;
		box-sizing: border-box;
	}
	.login-box {
		width: 380px;
		max-width: 100%;
		padding: 32px;
		background: #fff;
		border: 1px solid #e4e8f0;
		border-radius: 8px;
		box-shadow: 0 18px 45px rgba(32, 36, 42, 0.08);
		box-sizing: border-box;
	}
	.login-title {
		margin: 0 0 24px;
		font-size: 24px;
		line-height: 32px;
		text-align: center;
	}
	.form-row {
		margin-bottom: 16px;
	}
	.form-label {
		display: block;
		margin-bottom: 8px;
		font-size: 14px;
		color: #525967;
	}
	.key-input {
		width: 100%;
		height: 42px;
		padding: 0 12px;
		border: 1px solid #ccd4e0;
		border-radius: 6px;
		box-sizing: border-box;
		font-size: 15px;
		outline: none;
		transition: border-color .2s, box-shadow .2s;
	}
	.key-input:focus {
		border-color: #3e7cff;
		box-shadow: 0 0 0 3px rgba(62, 124, 255, 0.15);
	}
	.error-text {
		min-height: 20px;
		margin: 2px 0 14px;
		font-size: 13px;
		line-height: 20px;
		color: #d93025;
	}
	.login-button {
		width: 100%;
		height: 42px;
		border: 0;
		border-radius: 6px;
		background: #3e7cff;
		color: #fff;
		font-size: 15px;
		font-weight: bold;
		cursor: pointer;
	}
	.login-button:hover {
		background: #2f6dec;
	}
	.login-button:disabled {
		background: #9bb8f8;
		cursor: default;
	}
</style>
</head>
<body>
	<div class="login-page">
		<form class="login-box" id="loginForm" autocomplete="off">
			<h1 class="login-title">记账系统管理后台</h1>
			<div class="form-row">
				<label class="form-label" for="usernameInput">管理员账号</label>
				<input class="key-input" id="usernameInput" name="username" type="text" placeholder="请输入管理员账号" value="admin" autofocus>
			</div>
			<div class="form-row">
				<label class="form-label" for="passwordInput">管理员密码</label>
				<input class="key-input" id="passwordInput" name="password" type="password" placeholder="请输入管理员密码">
			</div>
			<div class="error-text" id="errorText"></div>
			<button class="login-button" id="loginButton" type="submit">登录</button>
		</form>
	</div>
	<script>
		(function () {
			var form = document.getElementById('loginForm');
			var usernameInput = document.getElementById('usernameInput');
			var passwordInput = document.getElementById('passwordInput');
			var errorText = document.getElementById('errorText');
			var button = document.getElementById('loginButton');

			form.addEventListener('submit', function (event) {
				event.preventDefault();
				var username = usernameInput.value.trim();
				var password = passwordInput.value;

				if (!username || !password) {
					errorText.textContent = '请输入管理员账号和密码';
					return;
				}

				button.disabled = true;
				button.textContent = '登录中...';
				errorText.textContent = '';
				fetch('api/adminLogin/index.php', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json;charset=UTF-8' },
					body: JSON.stringify({ username: username, password: password })
				}).then(function (res) {
					return res.json();
				}).then(function (data) {
					if (!data || !data.success) {
						throw new Error((data && data.txt) || '登录失败');
					}
					localStorage.setItem('orders-admin-session', JSON.stringify({ token: data.token, username: data.username }));
					if (data.apiToken) {
						localStorage.setItem('orders-token', JSON.stringify({ token: data.apiToken }));
					}
					window.location.href = 'adminPanel.html';
				}).catch(function (err) {
					errorText.textContent = err.message || '登录失败';
					button.disabled = false;
					button.textContent = '登录';
				});
			});
		})();
	</script>
</body>
</html>

	<script src="js/jquery.min.js"></script>
	<script type="text/javascript">
		(function () {
			var API_BASE = 'api';
			function adminToken() {
				try { return (JSON.parse(localStorage.getItem('orders-admin-session') || '{}').token || '').trim(); }
				catch (e) { return ''; }
			}
			function syncApiToken(token) {
				if (token) {
					localStorage.setItem('orders-token', JSON.stringify({ token: token }));
				} else {
					localStorage.removeItem('orders-token');
				}
			}
			function adminRequest(endpoint, payload) {
				return fetch(API_BASE + endpoint, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json;charset=UTF-8',
						'admin-token': adminToken()
					},
					body: JSON.stringify(payload || {})
				}).then(function (res) { return res.json(); });
			}
			function goLogin() {
				window.location.href = 'login.html';
			}
			window.logoutAdmin = function () {
				adminRequest('/adminLogout/index.php', {}).finally(function () {
					localStorage.removeItem('orders-admin-session');
					goLogin();
				});
			};
			if (!adminToken()) {
				goLogin();
				return;
			}
			adminRequest('/adminSettings/index.php', {}).then(function (data) {
				if (!data || !data.success) {
					localStorage.removeItem('orders-admin-session');
					goLogin();
					return;
				}
				syncApiToken(data.apiToken || '');
				document.documentElement.className = 'admin-ready';
				if (data.username) {
					var el = document.getElementById('adminName');
					if (el) el.textContent = data.username;
				}
			}).catch(goLogin);
		})();
		$(document).ready(function(){
			$('li[url]').click(function(){
				if (!$(this).hasClass('activited'))
				{
					$('.activited').removeClass('activited');
					$(this).addClass('activited');
					var url = $(this).attr('url');
					var sep = url.indexOf('?') > -1 ? '&' : '?';
					$('iframe').attr('src', url + sep + 'v=' + Date.now());
				}
			});
		});
	</script>
</head>
